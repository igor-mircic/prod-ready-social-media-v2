# Pod-local nginx config for the in-k3s frontend.
#
# Single `server` block on :8080 (the unprivileged-variant default).
#   - `/api/`      → reverse-proxied to the in-cluster backend Service.
#   - `/actuator/` → reverse-proxied to the same Service.
#   - everything else → static files from /usr/share/nginx/html, with
#     `try_files $uri $uri/ /index.html` so client-side React Router
#     routes deep-link correctly.
#
# Upstream is the in-cluster Service FQDN. nginx resolves it once at
# config-load time and caches the ClusterIP VIP — fine because the VIP
# is stable for the lifetime of the Service. If the backend Service is
# deleted-and-recreated, `frontend-rebuild` restarts nginx and
# re-resolves. The strict-pairing rule (design.md Decision 5) means
# the in-k3s FE returns 502 on `/api/*` if the in-k3s BE is missing —
# by design.

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip wins for text assets without measurable CPU cost on the
    # nginx-alpine container. Pre-compressed `.gz` files are not
    # enabled because Vite does not emit them by default.
    gzip on;
    gzip_types text/css application/javascript application/json;

    location /api/ {
        proxy_pass http://backend.social.svc.cluster.local:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /actuator/ {
        proxy_pass http://backend.social.svc.cluster.local:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
