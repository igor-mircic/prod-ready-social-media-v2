name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: backend (test + openapi drift)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: social
          POSTGRES_USER: social
          POSTGRES_PASSWORD: social
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Run backend tests
        working-directory: backend
        run: ./gradlew test

      - name: Generate OpenAPI spec
        working-directory: backend
        run: ./gradlew generateOpenApiDocs --no-configuration-cache

      - name: Verify openapi.json is up to date
        run: |
          if ! git diff --exit-code -- openapi/openapi.json; then
            echo "::error file=openapi/openapi.json::openapi/openapi.json is out of date."
            echo "Run \`./gradlew generateOpenApiDocs --no-configuration-cache\` from backend/ and commit the result."
            exit 1
          fi

      - name: Build backend JAR
        working-directory: backend
        run: ./gradlew bootJar

      - name: Upload backend JAR
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/build/libs/*.jar
          if-no-files-found: error
          retention-days: 1

  frontend:
    name: frontend (gen + test + build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      # `pnpm install` runs the `postinstall` script which executes `orval`
      # and produces frontend/src/api/generated/. The generated TS is
      # validated indirectly by `pnpm test` and `pnpm build` (typecheck).
      - name: Install (with codegen via postinstall)
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Test
        working-directory: frontend
        run: pnpm test

      - name: Build
        working-directory: frontend
        run: pnpm build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error
          retention-days: 1

  e2e:
    name: e2e (${{ matrix.browser }})
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: e2e/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: e2e/pnpm-lock.yaml

      - name: Download backend JAR
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend/build/libs

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Install frontend runtime deps for vite preview
        working-directory: frontend
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Install e2e deps (with codegen via postinstall)
        working-directory: e2e
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers (${{ matrix.browser }})
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ matrix.browser }}-${{ hashFiles('e2e/pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-${{ matrix.browser }}-

      - name: Install Playwright browser (${{ matrix.browser }})
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_on: any
          command: cd e2e && pnpm exec playwright install --with-deps ${{ matrix.browser }}

      - name: Run Playwright (${{ matrix.browser }})
        working-directory: e2e
        run: pnpm exec playwright test --project=${{ matrix.browser }}

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-${{ matrix.browser }}-${{ github.run_id }}
          path: |
            e2e/playwright-report
            e2e/test-results
          if-no-files-found: ignore
          retention-days: 7
