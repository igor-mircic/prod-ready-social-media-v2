name: ci

on:
  push:
    branches: [main]
  pull_request:

# Silence the OpenTelemetry Java agent's OTLP network exporters in
# CI — no collector listens on localhost:4318 here, and the agent's
# retry loop floods logs with `Failed to export spans /
# ConnectException`. Agent stays loaded so trace.id / span.id MDC
# keys remain populated. See openspec/changes/archive/
# 2026-05-14-silence-ci-otel-exporters/design.md.
env:
  OTEL_TRACES_EXPORTER: none
  OTEL_METRICS_EXPORTER: none
  OTEL_LOGS_EXPORTER: none

jobs:
  backend:
    name: backend (test + openapi drift)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: social
          POSTGRES_USER: social
          POSTGRES_PASSWORD: social
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Run backend tests
        working-directory: backend
        run: ./gradlew test

      - name: Generate OpenAPI spec
        working-directory: backend
        run: ./gradlew generateOpenApiDocs --no-configuration-cache

      - name: Verify openapi.json is up to date
        run: |
          if ! git diff --exit-code -- openapi/openapi.json; then
            echo "::error file=openapi/openapi.json::openapi/openapi.json is out of date."
            echo "Run \`./gradlew generateOpenApiDocs --no-configuration-cache\` from backend/ and commit the result."
            exit 1
          fi

      - name: Build backend JAR
        working-directory: backend
        run: ./gradlew bootJar

      - name: Upload backend JAR
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/build/libs/*.jar
          if-no-files-found: error
          retention-days: 1

      - name: Validate observability compose profile YAML
        run: docker compose --profile observability config -q

  prometheus-rules:
    name: prometheus (promtool test rules)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      # Slice 8: SLO recording/alerting rules + promtool test fixture.
      # Running `promtool test rules` against the pinned prom/prometheus
      # image is the executable spec for the alerting logic — it asserts
      # that each multi-window multi-burn-rate alert fires under crafted
      # synthetic series and that steady-state success doesn't fire any
      # availability alert. The image tag MUST match the version pinned
      # in `docker-compose.yml`'s `prometheus` service.
      - name: Lint rule files (promtool check rules)
        run: |
          docker run --rm \
            --entrypoint promtool \
            -v "$PWD/infra/observability/prometheus/rules:/rules:ro" \
            prom/prometheus:v2.55.1 \
            check rules \
              /rules/slo-recording.yml /rules/slo-alerting.yml \
              /rules/fe-slo-recording.yml /rules/fe-slo-alerting.yml

      - name: Run rule unit tests (promtool test rules)
        run: |
          docker run --rm \
            --entrypoint promtool \
            -v "$PWD/infra/observability/prometheus/rules:/rules:ro" \
            prom/prometheus:v2.55.1 \
            test rules /rules/slo-tests.yml /rules/fe-slo-tests.yml

  frontend:
    name: frontend (gen + test + build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      # `pnpm install` runs the `postinstall` script which executes `orval`
      # and produces frontend/src/api/generated/. The generated TS is
      # validated indirectly by `pnpm test` and `pnpm build` (typecheck).
      - name: Install (with codegen via postinstall)
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Test
        working-directory: frontend
        run: pnpm test

      - name: Build
        working-directory: frontend
        run: pnpm build

      # Slice-7 production-bundle guard: the dev-only `/__dev/throw`
      # route is wrapped in an `import.meta.env.DEV` conditional in
      # `App.tsx`. Vite tree-shakes that branch out of production
      # builds, so no built asset should reference the path. A grep
      # over `frontend/dist/assets/*.js` is the cheapest, most direct
      # check that the gate held. If this ever fails, the route would
      # otherwise be reachable in a real-server deploy.
      - name: Assert dev-only throw route absent from production bundle
        working-directory: frontend
        run: |
          if grep -r '__dev/throw' dist/assets/ 2>/dev/null; then
            echo "::error::Dev-only /__dev/throw route leaked into production bundle. Verify the import.meta.env.DEV gate in App.tsx."
            exit 1
          fi
          echo "OK: /__dev/throw not present in dist/assets/"

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error
          retention-days: 1

  e2e:
    name: e2e (${{ matrix.browser }})
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Keep this in lockstep with `container.image` below. The
      # `Assert container image tag matches @playwright/test` step
      # fails the job if this drifts from the `@playwright/test`
      # version pinned in `e2e/pnpm-lock.yaml`.
      PLAYWRIGHT_VERSION: 1.59.1
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
      # `--user root`: firefox refuses to launch when $HOME (set by
      # GitHub Actions to `/github/home`) is owned by a different UID
      # than the current user; running as root sidesteps the ownership
      # mismatch between the runner's host UID and the image's
      # default `pwuser` (uid 1000).
      # `--volume /var/run/docker.sock`: bind-mount the host Docker
      # socket so the harness's `globalSetup` can spawn a
      # Testcontainers Postgres as a sibling of this container
      # (sibling-container DinD pattern).
      options: --user root --volume /var/run/docker.sock:/var/run/docker.sock
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: e2e/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: e2e/pnpm-lock.yaml

      - name: Assert container image tag matches @playwright/test
        working-directory: e2e
        shell: bash
        run: |
          set -euo pipefail
          LOCK_VERSION="$(grep -oE "'@playwright/test@[0-9]+\.[0-9]+\.[0-9]+'" pnpm-lock.yaml | head -1 | sed -E "s/'@playwright\\/test@([0-9.]+)'/\\1/")"
          if [ -z "${LOCK_VERSION}" ]; then
            echo "::error::Could not resolve @playwright/test version from e2e/pnpm-lock.yaml"
            exit 1
          fi
          if [ "${LOCK_VERSION}" != "${PLAYWRIGHT_VERSION}" ]; then
            echo "::error::Drift: container image tag is v${PLAYWRIGHT_VERSION}-noble but e2e/pnpm-lock.yaml pins @playwright/test@${LOCK_VERSION}. Update container.image tag and PLAYWRIGHT_VERSION env var together, or update the @playwright/test pin."
            exit 1
          fi
          echo "OK: container image and @playwright/test both at ${LOCK_VERSION}"

      - name: Download backend JAR
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend/build/libs

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Install frontend runtime deps for vite preview
        working-directory: frontend
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Install e2e deps (with codegen via postinstall)
        working-directory: e2e
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers (${{ matrix.browser }})
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ matrix.browser }}-${{ hashFiles('e2e/pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-${{ matrix.browser }}-

      - name: Reconcile Playwright browser binaries (defence-in-depth, ${{ matrix.browser }})
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 3
          max_attempts: 2
          retry_on: any
          command: cd e2e && pnpm exec playwright install ${{ matrix.browser }}

      - name: Run Playwright (${{ matrix.browser }})
        working-directory: e2e
        env:
          # Firefox refuses to launch as root when $HOME is owned by
          # a different user (GitHub Actions sets HOME=/github/home,
          # which is owned by pwuser uid 1000 — not root inside the
          # container). Pointing HOME at /root, which root owns, lets
          # firefox launch. Documented as the supported workaround in
          # Playwright's own error message.
          HOME: /root
        run: pnpm exec playwright test --project=${{ matrix.browser }}

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-${{ matrix.browser }}-${{ github.run_id }}
          path: |
            e2e/playwright-report
            e2e/test-results
          if-no-files-found: ignore
          retention-days: 7
