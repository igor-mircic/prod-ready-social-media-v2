# Local-development dependencies for the monorepo.
#
# Currently provides a single Postgres service consumed by the backend's default
# Spring profile. Future components (frontend dev tooling, e2e tests, additional
# services like Redis or Kafka) extend this same file rather than spinning up
# their own compose stacks.
#
# Start with: docker-compose up -d postgres
#
# Opt-in observability stack (Prometheus + Grafana + Tempo + Collector + Loki,
# default off):
#   docker-compose --profile observability up -d
#
# Credentials below match the backend's default Spring profile in
# backend/src/main/resources/application.yaml. Override either side via the
# usual SPRING_DATASOURCE_* env vars when running the backend.
services:
  postgres:
    image: postgres:16-alpine
    container_name: social-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: social
      POSTGRES_USER: social
      POSTGRES_PASSWORD: social
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U social -d social"]
      interval: 5s
      timeout: 5s
      retries: 10

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: social-prometheus
    profiles: ["observability"]
    ports:
      - "9090:9090"
    volumes:
      - ./infra/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.2.0
    container_name: social-grafana
    profiles: ["observability"]
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_DEFAULT_THEME: light
    volumes:
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/observability/grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      - prometheus
      - tempo
      - loki
      - collector

  tempo:
    image: grafana/tempo:2.6.1
    container_name: social-tempo
    profiles: ["observability"]
    command: ["-config.file=/etc/tempo.yaml"]
    ports:
      - "3200:3200"
    volumes:
      - ./infra/observability/tempo/tempo.yaml:/etc/tempo.yaml:ro

  collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    container_name: social-collector
    profiles: ["observability"]
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./infra/observability/collector/collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
      - ./infra/observability/logs:/var/log/backend:ro

  loki:
    image: grafana/loki:3.2.0
    container_name: social-loki
    profiles: ["observability"]
    command: ["-config.file=/etc/loki/local-config.yaml"]
    # Expose 3100 on the host so e2e specs (and ad-hoc curl debugging)
    # can hit Loki's HTTP API directly without going through Grafana.
    # Grafana's Tempo→Loki tracesToLogs pivot uses the container DNS
    # name (`http://loki:3100`) regardless of host port mapping.
    ports:
      - "3100:3100"
    volumes:
      - ./infra/observability/loki/loki-config.yaml:/etc/loki/local-config.yaml:ro

volumes:
  postgres-data:
