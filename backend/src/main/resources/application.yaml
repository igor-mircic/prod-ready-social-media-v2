spring:
  application:
    name: backend
  datasource:
    url: jdbc:postgresql://localhost:5432/social
    username: social
    password: social
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url:
    username:
    password:

---
# Profile used by `./gradlew generateOpenApiDocs`. Disables datasource/JPA/Flyway
# autoconfig so the Spring context can boot headlessly without a running
# Postgres just to dump the OpenAPI spec.
spring:
  config:
    activate:
      on-profile: codegen
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.JpaRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration
