spring:
  application:
    name: backend
  datasource:
    url: jdbc:postgresql://localhost:5432/social
    username: social
    password: social
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

server:
  forward-headers-strategy: framework

logging:
  structured:
    format:
      console: ecs
    ecs:
      service:
        environment: local

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never
  metrics:
    tags:
      application: prod-ready-social-media-backend
      service: backend
    # Emit Prometheus histogram buckets (not just count/sum/max) so the
    # backend-overview dashboard's histogram_quantile(...) panels render.
    distribution:
      percentiles-histogram:
        http.server.requests: true
        feed.fanout.duration: true
        feed.read.duration: true
        posts.create.duration: true
        follows.follow.duration: true

app:
  auth:
    access-token-ttl: PT15M
    refresh-token-ttl: P30D

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url:
    username:
    password:
