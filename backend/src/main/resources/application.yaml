spring:
  application:
    name: backend
  datasource:
    url: jdbc:postgresql://localhost:5432/social
    username: social
    password: social
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

server:
  forward-headers-strategy: framework

logging:
  structured:
    format:
      console: ecs
      # File appender uses the same ECS formatter as the console appender —
      # every event renders as one byte-identical JSON line on both
      # surfaces when the file appender engages.
      file: ecs
    ecs:
      service:
        environment: local
  # Env-var gated: when LOG_FILE_PATH is unset (the default), the
  # placeholder resolves to an empty string and Spring Boot creates no
  # file appender — the dev loop stays stdout-only. When set (e.g.
  # ./infra/observability/logs/backend.json), Spring Boot writes the
  # same ECS JSON lines to that file alongside stdout, and the OTel
  # Collector's filelog receiver tails them into Loki.
  file:
    name: ${LOG_FILE_PATH:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never
  metrics:
    tags:
      application: prod-ready-social-media-backend
      service: backend
    # Emit Prometheus histogram buckets (not just count/sum/max) so the
    # backend-overview dashboard's histogram_quantile(...) panels render.
    distribution:
      percentiles-histogram:
        http.server.requests: true
        feed.fanout.duration: true
        feed.read.duration: true
        posts.create.duration: true
        follows.follow.duration: true

app:
  auth:
    access-token-ttl: PT15M
    refresh-token-ttl: P30D

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url:
    username:
    password:
