spring:
  application:
    name: backend
  datasource:
    url: jdbc:postgresql://localhost:5432/social
    username: social
    password: social
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url:
    username:
    password:
