# Single-binary Loki config for local-dev log shipping.
#
# Learning-project defaults:
# - local-filesystem storage rooted at /loki (production would back Loki
#   with object storage: S3 / GCS / Azure Blob backends).
# - retention disabled (production would set `limits_config.retention_period`
#   to a value measured in days and run the compactor with retention enabled).
# - anonymous, no auth (production would gate this).

auth_enabled: false

server:
  http_listen_address: 0.0.0.0
  http_listen_port: 3100

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  # retention_period: 0s disables retention. Learning-project default;
  # production would set this to a value like 168h (7 days) and run the
  # compactor against object storage.
  retention_period: 0s
  allow_structured_metadata: true

compactor:
  working_directory: /loki/compactor
  delete_request_store: filesystem
