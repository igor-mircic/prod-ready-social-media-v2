apiVersion: 1

# Tempo datasource — `editable: false` mirrors the Prometheus datasource so
# Grafana cannot mutate the provisioned state. `isDefault: false` keeps
# Prometheus the default datasource for ad-hoc queries.
#
# `tracesToLogsV2` turns a Tempo span view into a one-click pivot to the
# matching Loki log lines for the same request — keyed on the `trace.id`
# span tag and the symmetric `trace.id` field in the log line body.

datasources:
  - name: Tempo
    uid: tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    isDefault: false
    editable: false
    jsonData:
      tracesToLogsV2:
        datasourceUid: loki
        tags: ['trace.id']
        filterByTraceID: false
        spanStartTimeShift: '-1h'
        spanEndTimeShift: '1h'
        customQuery: true
        query: '{service_name="backend"} |~ `"trace\\.id":"${__span.traceId}"`'
      # Slice 5 (add-frontend-traces) adds the Service Graph pivot. Grafana
      # builds the graph by querying span-derived RED metrics from the
      # Prometheus datasource — once browser-emitted spans land with
      # `service.name=frontend`, the graph shows the `frontend → backend`
      # edge in Explore → Tempo → Service Graph.
      serviceMap:
        datasourceUid: prometheus
