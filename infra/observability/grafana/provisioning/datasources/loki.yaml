apiVersion: 1

# Loki datasource — `editable: false` mirrors the Prometheus and Tempo
# datasources so Grafana cannot mutate the provisioned state.
# `isDefault: false` keeps Prometheus the default datasource.
#
# `derivedFields` turns any `trace.id` value embedded in a Loki log line
# into a clickable link to the Tempo datasource (`logsToTraces`). The
# matcher regex keys on the literal ECS-nested JSON key
# `"trace.id":"<value>"` so the link only appears when a real trace id is
# present (lines emitted outside any span carry no `trace.id` field).

datasources:
  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: false
    jsonData:
      derivedFields:
        - name: trace_id
          matcherRegex: '"trace\.id":"(\w+)"'
          url: '${__value.raw}'
          datasourceUid: tempo
