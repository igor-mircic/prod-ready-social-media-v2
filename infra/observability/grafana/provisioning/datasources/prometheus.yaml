apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    # Slice 9: link Prometheus exemplars to Tempo traces. The label name
    # `trace_id` matches what the BE Actuator emits on each
    # `http_server_requests_seconds_bucket` exemplar (see
    # `ExemplarsConfig`); `datasourceUid: tempo` matches the UID
    # provisioned in `tempo.yaml`. Together they wire the exemplar
    # diamond's "Query with Tempo" pivot in Grafana panels that have
    # `options.exemplar = true` (see `dashboards/backend-overview.json`).
    # NOTE: Grafana reads provisioning files only at startup — a
    # `docker-compose --profile observability restart grafana` is
    # required after editing this file (see README and project memory
    # `project_grafana_provisioning_restart.md`).
    jsonData:
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: tempo
