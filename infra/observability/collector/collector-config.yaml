# OpenTelemetry Collector config for local-dev observability.
#
# Three pipelines:
# - traces:  OTLP receiver  -> batch -> redact-path-ids -> Tempo (otlp/tempo exporter).
# - metrics: OTLP receiver  -> batch -> drop_high_cardinality -> Prometheus exporter.
# - logs:    filelog receiver -> batch -> Loki (loki exporter).
#
# The OTel Java agent ships traces to host port 4318 (unchanged from
# slice 3 — only the container behind the port changes: the Collector
# now, instead of Tempo direct). The backend writes ECS JSON log lines
# to /var/log/backend/*.json (bind-mounted from
# ./infra/observability/logs on the host) when the developer exports
# LOG_FILE_PATH before ./gradlew bootRun. The filelog receiver tails
# that glob and the loki exporter pushes each line to Loki.
#
# Slice 5 (add-frontend-traces) adds:
#   - CORS on the OTLP/HTTP receiver so the browser SDK can POST spans
#     direct from the Vite dev/preview origins.
#   - A `transform/redact-path-ids` processor that replaces high-
#     cardinality path segments (UUIDs, opaque hex, numeric ids) on
#     both FE and BE spans before they reach Tempo.
#
# Slice 6 (add-frontend-rum-metrics) adds:
#   - A `metrics` pipeline that receives FE OTLP metrics on the same
#     `:4318` listener (CORS allowlist already covers `/v1/metrics`).
#   - A `filter/drop_high_cardinality` processor that drops any data
#     point whose `route` attribute contains an unredacted id —
#     defence-in-depth alongside the source-side route-template
#     labelling in `frontend/src/observability/route-timing.tsx`.
#   - A `prometheus` exporter on `0.0.0.0:8889` for Prometheus to
#     scrape (see `infra/observability/prometheus/prometheus.yml`).
#     `add_metric_suffixes: false` and `namespace: ""` keep the FE
#     metric names verbatim (`web_vitals_lcp_bucket`, not
#     `otelcol_web_vitals_lcp_milliseconds_bucket`) so dashboard
#     PromQL stays readable.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins:
            - http://localhost:5173
            - http://localhost:4173
          allowed_headers:
            - "*"

  filelog:
    include:
      - /var/log/backend/*.json
    start_at: beginning
    operators:
      # Parse each line as JSON; ECS fields land flat in attributes (nested
      # objects stay nested — e.g. attributes["service"]["name"]).
      - type: json_parser
        parse_from: body

      # Promote exactly three low-cardinality ECS fields to flat attributes
      # named with the dotted ECS names. The loki exporter, via the
      # `loki.attribute.labels` hint below, turns those three (and only
      # those three) into Loki labels. Everything else — including the
      # high-cardinality `request.id`, `user.id`, `trace.id`, `span.id` —
      # stays inside the JSON body and is queried via `| json` at read
      # time, so Loki label cardinality stays bounded.
      - type: copy
        from: attributes["service"]["name"]
        to: attributes["service_name"]
      - type: copy
        from: attributes["event"]["dataset"]
        to: attributes["event.dataset"]
      - type: copy
        from: attributes["log"]["level"]
        to: attributes["log.level"]
      - type: add
        field: attributes["loki.attribute.labels"]
        value: "service_name, event.dataset, log.level"

processors:
  batch: {}

  # Slice 5 redaction: replace high-cardinality path segments with the
  # literal token `{id}` in span name, `http.url`, `http.target`, and
  # `url.full` (where present). Applies to spans from any `service.name`
  # value — no `where` clause filters by service. Patterns, in order:
  #   1. UUID v4 (lowercase hex with hyphens) — no bounding needed; the
  #      hyphenated shape is unambiguous.
  #   2. opaque hex segments of length 8 or more, bounded on both sides
  #      by `/` or end-of-string. The trailing delimiter is captured
  #      and re-emitted (`$$1`) because Go's RE2 has no lookahead.
  #   3. numeric segments of length 4 or more, bounded as above.
  # UUID must come first so its hex form is not eaten by the opaque-
  # hex rule. The replacement is intentionally uniform (`{id}`) so
  # operators query by route template, not by id value. `$$1` is OTTL
  # escape syntax for a literal `$1` capture-group backreference.
  transform/redact-path-ids:
    trace_statements:
      - context: span
        statements:
          - replace_pattern(name, "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}", "{id}")
          - replace_pattern(name, "/[0-9a-f]{8,}(/|$)", "/{id}$$1")
          - replace_pattern(name, "/[0-9]{4,}(/|$)", "/{id}$$1")
          - replace_pattern(attributes["http.url"], "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}", "{id}") where attributes["http.url"] != nil
          - replace_pattern(attributes["http.url"], "/[0-9a-f]{8,}(/|$)", "/{id}$$1") where attributes["http.url"] != nil
          - replace_pattern(attributes["http.url"], "/[0-9]{4,}(/|$)", "/{id}$$1") where attributes["http.url"] != nil
          - replace_pattern(attributes["http.target"], "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}", "{id}") where attributes["http.target"] != nil
          - replace_pattern(attributes["http.target"], "/[0-9a-f]{8,}(/|$)", "/{id}$$1") where attributes["http.target"] != nil
          - replace_pattern(attributes["http.target"], "/[0-9]{4,}(/|$)", "/{id}$$1") where attributes["http.target"] != nil
          - replace_pattern(attributes["url.full"], "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}", "{id}") where attributes["url.full"] != nil
          - replace_pattern(attributes["url.full"], "/[0-9a-f]{8,}(/|$)", "/{id}$$1") where attributes["url.full"] != nil
          - replace_pattern(attributes["url.full"], "/[0-9]{4,}(/|$)", "/{id}$$1") where attributes["url.full"] != nil

  # Slice 6 metric guard: drop any FE-emitted data point whose `route`
  # attribute looks like an unredacted id (UUID v4, opaque hex >= 8
  # chars, or a numeric path segment of 4+ digits with the typical
  # `/digits/` shape). The frontend's `route-timing.tsx` already
  # labels by route template — this filter is the second line of
  # defence so a future code path that forgets to template-ify
  # cannot blow up Prometheus cardinality. OTTL `where` lets a clean
  # `route="/users/:userId"` pass through unchanged.
  filter/drop_high_cardinality:
    metrics:
      datapoint:
        - 'IsMatch(attributes["route"], "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}")'
        - 'IsMatch(attributes["route"], "[0-9a-f]{8,}")'
        - 'IsMatch(attributes["route"], "/[0-9]{4,}(/|$)")'

exporters:
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  loki:
    endpoint: http://loki:3100/loki/api/v1/push
    # Disable the exporter's default labels (`exporter`, `job`); the three
    # labels above are the entire promoted set.
    default_labels_enabled:
      exporter: false
      job: false

  # Slice 6: expose FE-emitted metrics as Prometheus text-exposition
  # format on `:8889/metrics`. `namespace: ""` and
  # `add_metric_suffixes: false` keep the OTLP names verbatim so the
  # Frontend overview dashboard's PromQL queries match what the
  # browser SDK emits (`web_vitals_lcp_bucket`, not
  # `otelcol_web_vitals_lcp_milliseconds_bucket`).
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: ""
    add_metric_suffixes: false

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, transform/redact-path-ids]
      exporters: [otlp/tempo]
    metrics:
      receivers: [otlp]
      processors: [batch, filter/drop_high_cardinality]
      exporters: [prometheus]
    logs:
      receivers: [filelog]
      processors: [batch]
      exporters: [loki]
