# OpenTelemetry Collector config for local-dev observability.
#
# The compose collector no longer receives browser OTLP directly — slice 18c
# moved browser OTLP same-origin through the in-k3s frontend nginx (`/v1/`)
# and the vite dev proxy. The app k3s collector now dual-writes to this
# collector (the `compose-relay` exporter) for the side-by-side parity check
# until slice 22 retires the compose path.
#
# Three pipelines:
# - traces:  OTLP receiver  -> batch -> redact-path-ids -> Tempo (otlp/tempo exporter).
# - metrics: OTLP receiver  -> batch -> drop_high_cardinality -> Prometheus exporter.
# - logs:    filelog receiver -> batch -> Loki (loki exporter).
#
# The OTel Java agent ships traces to host port 4318 (unchanged from
# slice 3 — only the container behind the port changes: the Collector
# now, instead of Tempo direct). The backend writes ECS JSON log lines
# to /var/log/backend/*.json (bind-mounted from
# ./infra/observability/logs on the host) when the developer exports
# LOG_FILE_PATH before ./gradlew bootRun. The filelog receiver tails
# that glob and the loki exporter pushes each line to Loki.
#
# Slice 5 (add-frontend-traces) added:
#   - A `transform/redact-path-ids` processor that replaces high-
#     cardinality path segments (UUIDs, opaque hex, numeric ids) on
#     both FE and BE spans before they reach Tempo. Slice 18c
#     additionally targets `url.path` (the attribute the modern Java
#     agent emits) — the previous target list was a silent no-op for
#     BE spans.
#
# Slice 6 (add-frontend-rum-metrics) added:
#   - A `metrics` pipeline that receives FE OTLP metrics on the same
#     `:4318` listener.
#   - A `filter/drop_high_cardinality` processor that drops any data
#     point whose `route` attribute contains an unredacted id —
#     defence-in-depth alongside the source-side route-template
#     labelling in `frontend/src/observability/route-timing.tsx`.
#   - A `prometheus` exporter on `0.0.0.0:8889` for Prometheus to
#     scrape (see `infra/observability/prometheus/prometheus.yml`).
#     `add_metric_suffixes: false` and `namespace: ""` keep the FE
#     metric names verbatim (`web_vitals_lcp_bucket`, not
#     `otelcol_web_vitals_lcp_milliseconds_bucket`) so dashboard
#     PromQL stays readable.
#
# Slice 7 (add-frontend-errors) added:
#   - A second `logs` pipeline receiving FE OTLP log records on the
#     same `:4318` listener.
#   - A `filter/frontend_only` processor that drops any log record
#     whose `resource.service.name != "frontend"` — defence-in-depth
#     so a future BE-via-OTLP migration doesn't accidentally route
#     backend logs through the FE-shaped redaction pass.
#   - An `attributes/pii_scrub` processor applying the same three
#     regex patterns the SDK uses (JWT, email, bearer-token) over
#     `error.message`, `error.stack_trace`, and `body`. The patterns
#     are intentionally identical to
#     `frontend/src/observability/error-sink.ts`'s `PII_REGEXES`;
#     when one changes the other must change in the same commit.
#   - Reuses the existing `loki` exporter from slice 4 — FE log
#     records land in Loki under `event.dataset=frontend.error`
#     alongside the BE `backend.access` stream.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  filelog:
    include:
      - /var/log/backend/*.json
    start_at: beginning
    operators:
      # Parse each line as JSON; ECS fields land flat in attributes (nested
      # objects stay nested — e.g. attributes["service"]["name"]).
      - type: json_parser
        parse_from: body

      # Promote exactly three low-cardinality ECS fields to flat attributes
      # named with the dotted ECS names. The loki exporter, via the
      # `loki.attribute.labels` hint below, turns those three (and only
      # those three) into Loki labels. Everything else — including the
      # high-cardinality `request.id`, `user.id`, `trace.id`, `span.id` —
      # stays inside the JSON body and is queried via `| json` at read
      # time, so Loki label cardinality stays bounded.
      - type: copy
        from: attributes["service"]["name"]
        to: attributes["service_name"]
      - type: copy
        from: attributes["event"]["dataset"]
        to: attributes["event.dataset"]
      - type: copy
        from: attributes["log"]["level"]
        to: attributes["log.level"]
      - type: add
        field: attributes["loki.attribute.labels"]
        value: "service_name, event.dataset, log.level"

processors:
  batch: {}

  # Slice 5 redaction: replace high-cardinality path segments with the
  # literal token `{id}` in span name, `http.url`, `http.target`, and
  # `url.full` (where present). Applies to spans from any `service.name`
  # value — no `where` clause filters by service. Patterns, in order:
  #   1. UUID v4 (lowercase hex with hyphens) — no bounding needed; the
  #      hyphenated shape is unambiguous.
  #   2. opaque hex segments of length 8 or more, bounded on both sides
  #      by `/` or end-of-string. The trailing delimiter is captured
  #      and re-emitted (`$$1`) because Go's RE2 has no lookahead.
  #   3. numeric segments of length 4 or more, bounded as above.
  # UUID must come first so its hex form is not eaten by the opaque-
  # hex rule. The replacement is intentionally uniform (`{id}`) so
  # operators query by route template, not by id value. `$$1` is OTTL
  # escape syntax for a literal `$1` capture-group backreference.
  transform/redact-path-ids:
    trace_statements:
      - context: span
        statements:
          - replace_pattern(name, "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}", "{id}")
          - replace_pattern(name, "/[0-9a-f]{8,}(/|$)", "/{id}$$1")
          - replace_pattern(name, "/[0-9]{4,}(/|$)", "/{id}$$1")
          - replace_pattern(attributes["http.url"], "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}", "{id}") where attributes["http.url"] != nil
          - replace_pattern(attributes["http.url"], "/[0-9a-f]{8,}(/|$)", "/{id}$$1") where attributes["http.url"] != nil
          - replace_pattern(attributes["http.url"], "/[0-9]{4,}(/|$)", "/{id}$$1") where attributes["http.url"] != nil
          - replace_pattern(attributes["http.target"], "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}", "{id}") where attributes["http.target"] != nil
          - replace_pattern(attributes["http.target"], "/[0-9a-f]{8,}(/|$)", "/{id}$$1") where attributes["http.target"] != nil
          - replace_pattern(attributes["http.target"], "/[0-9]{4,}(/|$)", "/{id}$$1") where attributes["http.target"] != nil
          - replace_pattern(attributes["url.full"], "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}", "{id}") where attributes["url.full"] != nil
          - replace_pattern(attributes["url.full"], "/[0-9a-f]{8,}(/|$)", "/{id}$$1") where attributes["url.full"] != nil
          - replace_pattern(attributes["url.full"], "/[0-9]{4,}(/|$)", "/{id}$$1") where attributes["url.full"] != nil
          # Slice 18c: target the attribute the modern OTel Java agent
          # actually emits. `http.url`/`http.target`/`url.full` are kept
          # for defence-in-depth against older instrumentation.
          - replace_pattern(attributes["url.path"], "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}", "{id}") where attributes["url.path"] != nil
          - replace_pattern(attributes["url.path"], "/[0-9a-f]{8,}(/|$)", "/{id}$$1") where attributes["url.path"] != nil
          - replace_pattern(attributes["url.path"], "/[0-9]{4,}(/|$)", "/{id}$$1") where attributes["url.path"] != nil

  # Slice 6 metric guard: drop any FE-emitted data point whose `route`
  # attribute looks like an unredacted id (UUID v4, opaque hex >= 8
  # chars, or a numeric path segment of 4+ digits with the typical
  # `/digits/` shape). The frontend's `route-timing.tsx` already
  # labels by route template — this filter is the second line of
  # defence so a future code path that forgets to template-ify
  # cannot blow up Prometheus cardinality. OTTL `where` lets a clean
  # `route="/users/:userId"` pass through unchanged.
  filter/drop_high_cardinality:
    metrics:
      datapoint:
        - 'IsMatch(attributes["route"], "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}")'
        - 'IsMatch(attributes["route"], "[0-9a-f]{8,}")'
        - 'IsMatch(attributes["route"], "/[0-9]{4,}(/|$)")'

  # Slice 7 FE-only gate. The OTLP/HTTP receiver carries logs from any
  # source that POSTs to `/v1/logs`; today only the frontend SDK does,
  # but the explicit drop here makes the boundary auditable. The
  # `filter` processor expects an OTTL expression that, when TRUE,
  # KEEPS the record — so the predicate is "service.name IS frontend",
  # not "NOT backend". `resource.attributes["service.name"]` is the
  # canonical OTel resource shape produced by the SDK's
  # `frontendResource` (see frontend/src/observability/resource.ts).
  filter/frontend_only:
    logs:
      log_record:
        - 'resource.attributes["service.name"] != "frontend"'

  # Slice 7 PII backstop — last-line redaction of any token, email,
  # or bearer-shaped substring that survived the SDK-side scrub. The
  # attributes processor's `update` action does not accept a regex
  # `pattern`, so we use the `transform` processor with OTTL's
  # `replace_pattern` over `attributes["error.message"]`,
  # `attributes["error.stack_trace"]`, and the top-level `body` field.
  #
  # Patterns are kept identical to
  # `frontend/src/observability/error-sink.ts`'s `PII_REGEXES`; if one
  # diverges from the other the auditable defence-in-depth promise
  # breaks. OTTL accepts Go-RE2 regex syntax (no lookahead/lookbehind);
  # the SDK regex set is JS-flavoured but the three patterns happen to
  # fit RE2 unchanged. `where ... != nil` guards prevent OTTL warnings
  # when a record is missing one of the attribute keys.
  transform/pii_scrub:
    log_statements:
      - context: log
        statements:
          - replace_pattern(attributes["error.message"], "eyJ[A-Za-z0-9_-]+\\.[A-Za-z0-9_-]+\\.[A-Za-z0-9_-]+", "[REDACTED]") where attributes["error.message"] != nil
          - replace_pattern(attributes["error.message"], "\\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}\\b", "[REDACTED]") where attributes["error.message"] != nil
          - replace_pattern(attributes["error.message"], "\\b[A-Za-z0-9+/=]{40,}\\b", "[REDACTED]") where attributes["error.message"] != nil
          - replace_pattern(attributes["error.stack_trace"], "eyJ[A-Za-z0-9_-]+\\.[A-Za-z0-9_-]+\\.[A-Za-z0-9_-]+", "[REDACTED]") where attributes["error.stack_trace"] != nil
          - replace_pattern(attributes["error.stack_trace"], "\\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}\\b", "[REDACTED]") where attributes["error.stack_trace"] != nil
          - replace_pattern(attributes["error.stack_trace"], "\\b[A-Za-z0-9+/=]{40,}\\b", "[REDACTED]") where attributes["error.stack_trace"] != nil
          - replace_pattern(body, "eyJ[A-Za-z0-9_-]+\\.[A-Za-z0-9_-]+\\.[A-Za-z0-9_-]+", "[REDACTED]")
          - replace_pattern(body, "\\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}\\b", "[REDACTED]")
          - replace_pattern(body, "\\b[A-Za-z0-9+/=]{40,}\\b", "[REDACTED]")

  # Slice 7 Loki label hints — the loki exporter promotes only the
  # attributes/resource-attributes nominated in `loki.attribute.labels`
  # / `loki.resource.labels`. Without these hints, FE log records reach
  # Loki under a single empty label set and the LogQL query
  # `{event_dataset="frontend.error"}` cannot match. The hint values
  # use the OTel attribute names exactly; the exporter exposes them as
  # Loki labels with dots replaced by underscores per Loki label-name
  # rules (so `event.dataset` → `event_dataset`, `service.name` →
  # `service_name` — matching the slice-4 BE label set).
  attributes/loki_labels:
    actions:
      - key: loki.attribute.labels
        action: insert
        value: "event.dataset"
      - key: loki.resource.labels
        action: insert
        value: "service.name"

exporters:
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  loki:
    endpoint: http://loki:3100/loki/api/v1/push
    # Disable the exporter's default labels (`exporter`, `job`); the three
    # labels above are the entire promoted set.
    default_labels_enabled:
      exporter: false
      job: false

  # Slice 6: expose FE-emitted metrics as Prometheus text-exposition
  # format on `:8889/metrics`. `namespace: ""` and
  # `add_metric_suffixes: false` keep the OTLP names verbatim so the
  # Frontend overview dashboard's PromQL queries match what the
  # browser SDK emits (`web_vitals_lcp_bucket`, not
  # `otelcol_web_vitals_lcp_milliseconds_bucket`).
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: ""
    add_metric_suffixes: false

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, transform/redact-path-ids]
      exporters: [otlp/tempo]
    metrics:
      receivers: [otlp]
      processors: [batch, filter/drop_high_cardinality]
      exporters: [prometheus]
    # BE log shipping (slice 4): filelog tails the bind-mounted ECS
    # JSON files and exports to Loki.
    logs/backend:
      receivers: [filelog]
      processors: [batch]
      exporters: [loki]
    # FE log shipping (slice 7): OTLP/HTTP receives browser-emitted
    # error log records. The pipeline filters to `service.name=frontend`
    # only, applies the PII regex backstop over attributes and body,
    # then routes to the same Loki exporter (records land under
    # `event.dataset=frontend.error`).
    logs/frontend:
      receivers: [otlp]
      processors:
        - batch
        - filter/frontend_only
        - transform/pii_scrub
        - attributes/loki_labels
      exporters: [loki]
