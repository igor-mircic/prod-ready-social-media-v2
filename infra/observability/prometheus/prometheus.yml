# Prometheus scrape configuration for the local-dev observability stack.
#
# The backend runs on the host (Gradle bootRun, port 8080), NOT inside a
# container — so the scrape target is `host.docker.internal:8080`.
#
# NOTE: `host.docker.internal` resolves automatically on Docker Desktop for
# macOS and Windows. On Linux it does NOT resolve by default. Linux operators
# must either:
#   - add `extra_hosts: ["host.docker.internal:host-gateway"]` to the
#     `prometheus` service in `docker-compose.yml`, OR
#   - set the prometheus service to `network_mode: host` and update this
#     target to `localhost:8080`.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Slice 8: SLO recording rules + multi-window multi-burn-rate alerting rules.
# The compose mount maps `infra/observability/prometheus/rules/` (host) to
# `/etc/prometheus/rules/` (container) read-only — see `docker-compose.yml`.
# Editing rule files requires a `docker-compose --profile observability
# restart prometheus` to pick up; restart instructions live in the README.
rule_files:
  - rules/slo-recording.yml
  - rules/slo-alerting.yml
  # Slice 10: frontend SLO recording + alerting rules. Backed by the
  # `web_vitals_lcp_bucket{le="2500"}` and `web_vitals_inp_bucket{le="200"}`
  # series emitted via the OTel Collector under `service_name="frontend"`.
  - rules/fe-slo-recording.yml
  - rules/fe-slo-alerting.yml

# Slice 8: route firings to the Alertmanager container on the shared docker
# network. The compose service name is `alertmanager`; its HTTP API is on
# port 9093. (Published to host as `http://localhost:9093` for the UI.)
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: backend
    metrics_path: /actuator/prometheus
    scrape_interval: 15s
    static_configs:
      - targets:
          - host.docker.internal:8080

  # Slice 6: scrape the OTel Collector's `prometheus` exporter, which
  # re-exposes browser-emitted FE OTLP metrics (Web Vitals, route
  # transition timing, long tasks) as Prometheus text-exposition.
  # The Collector container DNS name is `collector` on the shared
  # docker network; port `8889` is bound by the `prometheus` exporter
  # block in `infra/observability/collector/collector-config.yaml`.
  - job_name: collector
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets:
          - collector:8889
