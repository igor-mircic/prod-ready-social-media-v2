# Hetzner overlay — PLACEHOLDER for the eventual add-hetzner-deploy
# slice (slice 23 in the arc planned by slice 17's design.md).
#
# TODO (add-hetzner-deploy): this overlay will fill in the
# production-grade counterparts of the base LGTM resources for
# the second Hetzner box (the dedicated observability host —
# likely a CPX11 or CAX11 SKU, smaller than the app cluster's
# CAX21). Items the slice will add, in roughly the order it will
# resolve them:
#
#   - Secret strategy. The base grafana Secret committed under
#     infra/k8s-obs/base/grafana/secret.yaml is a LOCAL-DEV
#     credential (the value is marked with the
#     `social.io/credential-scope: local-dev` label). It MUST NOT
#     be reused on this overlay path. The slice will either remove
#     the base secret and add a Hetzner-specific one, or replace
#     it via a strategic-merge patch that points the grafana chart
#     at a different `admin.existingSecret` name. The chosen
#     strategy (SOPS-encrypted-at-rest in-repo, Sealed Secrets
#     controller, or imperative kubectl-from-password-manager) is
#     the slice's first open question.
#
#   - Ingress + TLS for grafana. Local overlay reaches grafana via
#     `just obs-grafana` (kubectl port-forward); the Hetzner box
#     needs a publicly-reachable hostname. cert-manager + Let's
#     Encrypt (HTTP-01 on Traefik, the k3s default Ingress
#     controller) is the leading approach. The future
#     `add-cluster-ingress` slice (if it lands before
#     add-hetzner-deploy) settles the Traefik-vs-ingress-nginx
#     question; this overlay's Ingress resource(s) follow that
#     decision.
#
#   - Storage sizing for the production obs box. Base PVCs
#     (prometheus 5Gi, loki 5Gi, tempo 5Gi, grafana 1Gi,
#     alertmanager 1Gi, total 17 Gi) fit the local 64 Gi VM disk.
#     The Hetzner obs box's disk envelope (CPX11 ~ 40 Gi, CAX11 ~
#     40 Gi) is similar but the retention windows the slice will
#     declare (per-component) drive the actual sizing; numbers
#     measured on observed steady-state usage, not guessed here.
#
#   - Anti-affinity / topology constraints if and when the obs
#     cluster grows beyond one node. Single-node by design today
#     — same posture as the app cluster — so this is a future-only
#     item, captured for symmetry with the app cluster's Hetzner
#     overlay (which also notes it).
#
#   - Retention tuning. Base values use chart defaults (or short
#     windows: prometheus 7d, tempo 72h). Production retention is
#     a downstream slice's decision; the slice will land explicit
#     retention configs alongside the storage sizing.
#
# Slice 18b (bridge-collectors-to-obs-cluster) — the next slice
# (add-hetzner-deploy) will plug the obs-cluster collector pieces
# in here:
#
#   - Production resource caps on the collector container.
#     Probably `requests: cpu=100m / memory=256Mi`, `limits:
#     cpu=1000m / memory=1Gi` — this is the cross-cluster
#     aggregation point and will absorb the app cluster's traces
#     today plus slice 20's log records and slice 21's metric
#     data points later. The local overlay's
#     50m/128m..500m/512m envelope assumes a single-developer
#     trace volume.
#   - Real TLS material on the OTLP receiver. Slice 19
#     (`add-cross-cluster-mtls`) landed the cross-cluster trust
#     model on the LOCAL mirror: a shared self-signed CA is the
#     trust anchor for both clusters; the obs collector's OTLP
#     receiver mounts a server cert + key + CA cert at
#     /etc/otelcol-contrib/certs/ and requires CA-signed client
#     certs at the TLS handshake (via configtls's implicit
#     RequireAndVerifyClientCert when client_ca_file is set in
#     otelcol-contrib v0.111.0; `require_client_cert: true`
#     becomes explicit on the v0.112.0+ bump).
#
#     For prod (slice 23, add-hetzner-deploy), the slice-19 trust
#     model carries forward UNCHANGED — the same self-signed CA
#     stays the cross-cluster trust anchor; only the cert
#     DISTRIBUTION mechanism changes:
#       - cert-manager + a self-signed `ClusterIssuer` of kind
#         `SelfSigned` produces and rotates the server cert
#         (and the app cluster's client cert), so the CA private
#         key is NEVER kept on disk on a developer machine. The
#         CA private key lives in a Secret managed by the
#         issuer, accessible only to cert-manager.
#       - The server cert's SAN list swaps `host.lima.internal`
#         for the obs box's production address (private-network
#         IP / Tailscale hostname / DNS name).
#       - Renewals are automated by cert-manager (default
#         renewal at 2/3 of the cert's validity); the
#         slice-19 manual `just obs-certs` recipe is local-only.
#       - The Deployment volume mount and the configmap
#         receiver `tls:` blocks remain identical — cert-manager
#         materialises the same {server.crt, server.key, ca.crt}
#         file set into the same Secret name the slice-19
#         secretGenerator produces today.
#   - Ingress or LoadBalancer that terminates inbound OTLP on
#     the obs box's public / private IP. Local overlay uses
#     klipper-lb + Lima portForwards; on Hetzner this is
#     hcloud-cloud-controller-manager's LoadBalancer (a Hetzner
#     LB with private-network-only frontend) or a Traefik
#     IngressRouteTCP, decided alongside the
#     `add-cluster-ingress` slice.
#   - Tighter probe timings: `livenessProbe.timeoutSeconds`
#     explicit at 1s, `readinessProbe.periodSeconds` perhaps 3s,
#     `livenessProbe.initialDelaySeconds` lower (the contrib
#     collector starts in well under a second on the CAX11
#     envelope). Final numbers measured on the real box.
#   - Storage / retention sizing for the obs box. The obs
#     collector itself is mostly stateless (no on-disk buffer in
#     this slice; the `sending_queue` extension defaults to in-
#     memory), but the slice that lands prod will revisit whether
#     to add an on-disk queue to absorb network partitions to
#     the app cluster's OTLP exporter. Tied to the disk envelope
#     the rest of the LGTM stack uses.
#
# Apply path is intentionally NOT wired into the justfile in this
# slice. `just obs-apply` targets overlays/local only. The slice
# that adds Hetzner deploy will add a separate `obs-apply-hetzner`
# (or merge the two via a context-aware variable).
#
# slice 18c added logs and metrics pipelines targeting in-cluster loki and prometheus — production-side adds mTLS termination on the OTLP receiver in slice 19; storage / retention tuning lands in the Hetzner deploy slice.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base
