# Local-development grafana admin credentials. Slice 17
# (add-local-k3s-obs-cluster).
#
# THIS IS A LOCAL-DEV CREDENTIAL. Documented in the README's
# "Local observability cluster" section as the canonical password
# for the in-VM grafana on `social-obs`. The Hetzner overlay
# (infra/k8s-obs/overlays/hetzner/kustomization.yaml) MUST NOT
# reuse this Secret; the placeholder there spells the substitution
# out (Sealed Secrets / SOPS / out-of-band kubectl create — TBD).
#
# Credentials:
#   admin-user:     admin
#   admin-password: obs-local-dev
#
# Secret name MUST match the `admin.existingSecret` reference in
# infra/k8s-obs/base/grafana/values.yaml. The data keys
# (`admin-user`, `admin-password`) match the `userKey` /
# `passwordKey` declared there.
apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin-credentials
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/instance: grafana
    app.kubernetes.io/component: admin-credentials
    # Defence-in-depth marker so a grep / kustomize search makes it
    # obvious this is a local-only credential. The Hetzner overlay
    # will not carry a Secret with this label value.
    social.io/credential-scope: local-dev
  annotations:
    social.io/secret-policy: |-
      Local-dev credential only. Documented in README's
      "Local observability cluster" section. Hetzner overlay MUST
      replace via SOPS / Sealed Secrets / out-of-band kubectl.
type: Opaque
data:
  # `admin` — base64. Decode: `echo YWRtaW4= | base64 -d`.
  admin-user: YWRtaW4=
  # `obs-local-dev` — base64. Decode:
  # `echo b2JzLWxvY2FsLWRldg== | base64 -d`.
  admin-password: b2JzLWxvY2FsLWRldg==
