# Grafana workload — the grafana `grafana` chart wrapped by
# Kustomize via the `helmCharts:` directive. Rendered with
# `kustomize build --enable-helm` (the `just obs-apply` recipe
# wraps the flag).
#
# A sibling plain-YAML resource (secret.yaml) rides along under
# `resources:` so a single render produces the chart resources +
# the admin-credential Secret in one stream.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
- name: grafana
  repo: https://grafana.github.io/helm-charts
  # Chart version pin. Resolved against the active grafana/grafana
  # release at slice authoring (2026-05-16). Bumping is a
  # deliberate edit to this file.
  version: 10.5.15
  releaseName: grafana
  namespace: observability
  valuesFile: values.yaml

resources:
- ./secret.yaml

# Slice 21 (add-k3s-cluster-metrics): wrap every dashboard JSON
# under ./dashboards/ in a ConfigMap whose name the grafana
# chart's `dashboardsConfigMaps.default` setting in values.yaml
# references. `disableNameSuffixHash: true` keeps the name
# stable across re-renders so the chart's
# `dashboardsConfigMaps:` reference resolves; dashboard edits
# are picked up via `kubectl rollout restart deploy/grafana`
# (kubelet does NOT auto-restart pods when a mounted
# ConfigMap's data changes — same posture every other slice's
# collector ConfigMaps take).
configMapGenerator:
  - name: grafana-dashboards-default
    files:
      - dashboards/cluster-overview.json
    options:
      disableNameSuffixHash: true
