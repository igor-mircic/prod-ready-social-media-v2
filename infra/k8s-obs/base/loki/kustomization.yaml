# Loki workload — the grafana `loki` chart wrapped by Kustomize via
# the `helmCharts:` directive. Rendered with
# `kustomize build --enable-helm` (the `just obs-apply` recipe
# wraps the flag).
#
# Deployment mode: SingleBinary (monolithic), NOT SimpleScalable or
# Distributed. The obs cluster is single-node single-PVC at
# learning-project scale — design.md Decision 3 / Decision 4. The
# distributed deployments fit a real ops team; monolithic fits a
# project whose goal is to make every byte of observability
# behavior visible in the repo.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
- name: loki
  repo: https://grafana.github.io/helm-charts
  # Chart version pin. Resolved against the active grafana/loki
  # release at slice authoring (2026-05-16). Bumping is a
  # deliberate edit to this file.
  version: 7.0.0
  releaseName: loki
  namespace: observability
  valuesFile: values.yaml
