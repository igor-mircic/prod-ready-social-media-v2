# Obs cluster OpenTelemetry Collector pipeline (slice 18b / 18c).
#
# Three pipelines (slice 18c added logs and metrics symmetric with the
# slice-18b traces dual-write from the app cluster):
#   OTLP receiver (gRPC :4317, HTTP :4318, NO CORS — only the app
#                  cluster collector dials this receiver via the
#                  klipper-lb-fronted LoadBalancer Service `collector`)
#     -> batch
#     -> traces:  transform/redact-path-ids
#                 -> otlp/tempo   (tempo.observability.svc.cluster.local:4317, tls insecure)
#     -> logs:    transform/redact-path-ids
#                 -> otlphttp/loki (http://loki.observability.svc.cluster.local:3100/otlp,
#                                   Loki 3.x native OTLP ingest)
#     -> metrics: (batch only)
#                 -> prometheusremotewrite/in-cluster
#                    (http://prometheus-server.observability.svc.cluster.local/api/v1/write)
#
# Source-of-truth sibling for the `transform/redact-path-ids` OTTL
# block: `infra/k8s/base/collector/configmap.yaml` (the app cluster
# collector). The OTTL statements MUST stay byte-identical across
# ALL THREE collectors (compose at
# `infra/observability/collector/collector-config.yaml`, app
# cluster at `infra/k8s/base/collector/configmap.yaml`, and this
# obs cluster copy) until slice 22 (`retire-compose-observability`)
# collapses the compose path. Slice 18c also added
# `attributes["url.path"]` to every site (the attribute the modern
# OTel Java agent actually emits). If you edit one set of statements
# you MUST edit the other two in the same commit, otherwise BE-in-
# k3s traffic gets asymmetric redaction across destinations.
#
# Redaction at this hop is defence-in-depth: the app collector
# already redacts before exporting. Repeating the same statements
# here means a future regression at the app collector cannot leak
# high-cardinality path segments into obs tempo / loki storage.
#
# No CORS block on the OTLP/HTTP receiver: only the app cluster
# collector pod dials this receiver. The browser ships to the FE pod
# (in-k3s nginx) or the vite dev proxy (dev), which forward to the
# app collector — NEVER to this collector directly.
#
# No filter/frontend_only here — the app collector's logs pipeline
# already applies that filter before exporting to this collector.
# Repeating it would be a defence-in-depth no-op once the app
# collector enforces it; for now it stays single-site.
apiVersion: v1
kind: ConfigMap
metadata:
  name: collector-config
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch: {}

      # MIRROR of the app cluster collector's redact-path-ids
      # block at `infra/k8s/base/collector/configmap.yaml`. Keep
      # byte-identical with that sibling AND with the compose
      # collector at
      # `infra/observability/collector/collector-config.yaml`
      # until slice 22 retires the compose path. Patterns, in
      # order:
      #   1. UUID v4 (lowercase hex with hyphens).
      #   2. opaque hex segments of length 8+, bounded by `/` or
      #      end-of-string. The trailing delimiter is captured
      #      (`$$1`) because Go's RE2 has no lookahead.
      #   3. numeric segments of length 4+, bounded as above.
      # UUID must come first so its hex form is not eaten by the
      # opaque-hex rule. Replacement is uniform (`{id}`).
      transform/redact-path-ids:
        trace_statements:
          - context: span
            statements:
              - replace_pattern(name, "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}", "{id}")
              - replace_pattern(name, "/[0-9a-f]{8,}(/|$)", "/{id}$$1")
              - replace_pattern(name, "/[0-9]{4,}(/|$)", "/{id}$$1")
              - replace_pattern(attributes["http.url"], "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}", "{id}") where attributes["http.url"] != nil
              - replace_pattern(attributes["http.url"], "/[0-9a-f]{8,}(/|$)", "/{id}$$1") where attributes["http.url"] != nil
              - replace_pattern(attributes["http.url"], "/[0-9]{4,}(/|$)", "/{id}$$1") where attributes["http.url"] != nil
              - replace_pattern(attributes["http.target"], "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}", "{id}") where attributes["http.target"] != nil
              - replace_pattern(attributes["http.target"], "/[0-9a-f]{8,}(/|$)", "/{id}$$1") where attributes["http.target"] != nil
              - replace_pattern(attributes["http.target"], "/[0-9]{4,}(/|$)", "/{id}$$1") where attributes["http.target"] != nil
              - replace_pattern(attributes["url.full"], "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}", "{id}") where attributes["url.full"] != nil
              - replace_pattern(attributes["url.full"], "/[0-9a-f]{8,}(/|$)", "/{id}$$1") where attributes["url.full"] != nil
              - replace_pattern(attributes["url.full"], "/[0-9]{4,}(/|$)", "/{id}$$1") where attributes["url.full"] != nil
              # Slice 18c: target the attribute the modern OTel Java
              # agent actually emits. `http.url`/`http.target`/`url.full`
              # are kept for defence-in-depth against older
              # instrumentation.
              - replace_pattern(attributes["url.path"], "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}", "{id}") where attributes["url.path"] != nil
              - replace_pattern(attributes["url.path"], "/[0-9a-f]{8,}(/|$)", "/{id}$$1") where attributes["url.path"] != nil
              - replace_pattern(attributes["url.path"], "/[0-9]{4,}(/|$)", "/{id}$$1") where attributes["url.path"] != nil

    extensions:
      # Bind explicitly to 0.0.0.0 — the contrib collector's
      # health_check extension defaults to `localhost:13133`,
      # which the kubelet probe cannot reach from outside the
      # pod's network namespace. Binding all interfaces is safe:
      # the port is not on the Service, so only the pod-local
      # kubelet probe ever reaches it.
      health_check:
        endpoint: 0.0.0.0:13133

    exporters:
      # In-cluster hop to tempo's chart-exposed OTLP/gRPC
      # receiver. Both pods are in the same k3s, so this is
      # loopback-equivalent — `tls.insecure: true` is safe. Slice
      # 19 (`add-cross-cluster-mtls`) introduces TLS material on
      # the *receiver* side of THIS collector (see the otlp
      # receiver above gaining a `protocols.grpc.tls:` block);
      # this in-cluster exporter is unchanged by that work.
      otlp/tempo:
        endpoint: tempo.observability.svc.cluster.local:4317
        tls:
          insecure: true

      # Slice 18c: Loki 3.x native OTLP ingest. The chart-pinned
      # loki 3.6.7 exposes the OTLP/HTTP endpoint at `/otlp/v1/logs`
      # on the existing loki Service. Putting OTel→Loki attribute-
      # to-label mapping on Loki's side (design.md Decision 2)
      # avoids drift between this collector's exporter config and
      # any future obs collector that also writes to loki.
      otlphttp/loki:
        endpoint: http://loki.observability.svc.cluster.local:3100/otlp
        tls:
          insecure: true

      # Slice 18c: prometheus remote-write into the in-cluster
      # prometheus-server Service. The `web.enable-remote-write-
      # receiver` flag added in `infra/k8s-obs/base/prometheus/
      # values.yaml` lights up `POST /api/v1/write` on the
      # chart-default `prometheus-server` Service.
      prometheusremotewrite/in-cluster:
        endpoint: http://prometheus-server.observability.svc.cluster.local/api/v1/write
        tls:
          insecure: true

    service:
      extensions: [health_check]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch, transform/redact-path-ids]
          exporters: [otlp/tempo]
        logs:
          receivers: [otlp]
          processors: [batch, transform/redact-path-ids]
          exporters: [otlphttp/loki]
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [prometheusremotewrite/in-cluster]
