# Frontend SLO recording rules — per-window slow-fraction ratios for the two
# timing-based Core Web Vitals SLOs (LCP, INP).
#
# Names follow Prometheus's <level>:<metric>:<operation> convention. We keep
# the `job:` prefix for symmetry with backend SLO recording rules even though
# the underlying samples carry `job="collector"` (Prometheus scrapes the
# OTel Collector exporter, not the frontend directly). The actual identity
# filter is `service_name="frontend"` on the OTel Resource label — durable
# across any future scrape-topology change.
#
# Windows: 5m, 30m, 1h, 6h. Each is needed by at least one of the two
# Google-SRE-Workbook multi-window multi-burn-rate pairs in `fe-slo-alerting.yml`:
#   fast page : 1h × 5m
#   slow page : 6h × 30m
# No 3d window — FE latency SLOs omit the ticket alert, matching the backend
# latency SLOs (see `slo-alerting.yml`).
#
# Bucket alignment: the LCP and INP histograms set explicit boundaries in
# `frontend/src/observability/meter.ts` so `le="2500"` (LCP, ms) and
# `le="200"` (INP, ms) exist exactly.
groups:
  - name: fe_slo_recording
    interval: 30s
    rules:
      # LCP SLO: fraction of page loads with web_vitals_lcp ≥ 2500ms.
      - record: job:slo_lcp:slow_ratio_rate5m
        expr: |
          1 - (
            sum(rate(web_vitals_lcp_bucket{service_name="frontend", le="2500"}[5m]))
            /
            sum(rate(web_vitals_lcp_count{service_name="frontend"}[5m]))
          )
        labels:
          service: frontend
      - record: job:slo_lcp:slow_ratio_rate30m
        expr: |
          1 - (
            sum(rate(web_vitals_lcp_bucket{service_name="frontend", le="2500"}[30m]))
            /
            sum(rate(web_vitals_lcp_count{service_name="frontend"}[30m]))
          )
        labels:
          service: frontend
      - record: job:slo_lcp:slow_ratio_rate1h
        expr: |
          1 - (
            sum(rate(web_vitals_lcp_bucket{service_name="frontend", le="2500"}[1h]))
            /
            sum(rate(web_vitals_lcp_count{service_name="frontend"}[1h]))
          )
        labels:
          service: frontend
      - record: job:slo_lcp:slow_ratio_rate6h
        expr: |
          1 - (
            sum(rate(web_vitals_lcp_bucket{service_name="frontend", le="2500"}[6h]))
            /
            sum(rate(web_vitals_lcp_count{service_name="frontend"}[6h]))
          )
        labels:
          service: frontend

      # INP SLO: fraction of interactions with web_vitals_inp ≥ 200ms.
      - record: job:slo_inp:slow_ratio_rate5m
        expr: |
          1 - (
            sum(rate(web_vitals_inp_bucket{service_name="frontend", le="200"}[5m]))
            /
            sum(rate(web_vitals_inp_count{service_name="frontend"}[5m]))
          )
        labels:
          service: frontend
      - record: job:slo_inp:slow_ratio_rate30m
        expr: |
          1 - (
            sum(rate(web_vitals_inp_bucket{service_name="frontend", le="200"}[30m]))
            /
            sum(rate(web_vitals_inp_count{service_name="frontend"}[30m]))
          )
        labels:
          service: frontend
      - record: job:slo_inp:slow_ratio_rate1h
        expr: |
          1 - (
            sum(rate(web_vitals_inp_bucket{service_name="frontend", le="200"}[1h]))
            /
            sum(rate(web_vitals_inp_count{service_name="frontend"}[1h]))
          )
        labels:
          service: frontend
      - record: job:slo_inp:slow_ratio_rate6h
        expr: |
          1 - (
            sum(rate(web_vitals_inp_bucket{service_name="frontend", le="200"}[6h]))
            /
            sum(rate(web_vitals_inp_count{service_name="frontend"}[6h]))
          )
        labels:
          service: frontend
