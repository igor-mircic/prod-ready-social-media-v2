# Database-tier infra alerts (slice 12). Backed by `postgres-exporter`
# series; loaded via the `rule_files:` glob in `prometheus.yml`.
#
# Routing labels follow the slice-11 contract:
#   severity ∈ {page, ticket}
# No `slo` label — these alerts protect database health, not a user-visible
# SLO. The slice-11 inhibition rule (`slo=~".+"`) therefore does NOT match
# them, which is correct: a backend-down event might mask connection
# saturation, but the saturation alert is a useful independent signal that
# "Postgres itself is wedged."
#
# Series naming: the `postgres-exporter` v0.17.x build emits `pg_stat_database`
# counters WITHOUT a `_total` suffix — `pg_stat_database_deadlocks`, not
# `pg_stat_database_deadlocks_total`. The metric TYPE is still `counter`, so
# `rate()` / `increase()` work as expected. The promtool fixture in
# `database-tests.yml` pins the exact series names used here.
groups:
  - name: database_alerts
    rules:
      # Connection pressure approaching the configured `max_connections`.
      # Pages because once the pool saturates, the application starts
      # failing to acquire connections — user-visible. 5m `for:` filters
      # transient spikes from cold-start traffic / batch jobs.
      - alert: PostgresConnectionSaturation
        expr: |
          pg_stat_database_numbackends{datname="social"} / on() pg_settings_max_connections > 0.8
        for: 5m
        labels:
          severity: page
        annotations:
          summary: "Postgres connection count > 80% of max_connections."
          description: "Active backends on database `social` have exceeded 80% of `max_connections` for at least 5 minutes. The app will start failing to acquire connections soon; investigate before user-visible impact lands."
          runbook_url: "https://github.com/igor-mircic/prod-ready-social-media-v2/blob/main/infra/runbooks/PostgresConnectionSaturation.md"

      # Any deadlock in the last 5 minutes files a ticket. Deadlocks are
      # usually self-resolving but indicate a query-pattern bug worth
      # investigating. No `for:` clause — a single occurrence is enough.
      - alert: PostgresDeadlocks
        expr: |
          increase(pg_stat_database_deadlocks{datname="social"}[5m]) > 0
        labels:
          severity: ticket
        annotations:
          summary: "Postgres recorded one or more deadlocks in the last 5 minutes."
          description: "Database `social` recorded at least one deadlock in the last 5 minutes. Deadlocks usually self-resolve via Postgres's victim selection, but indicate a query-ordering or locking bug worth tracing."
          runbook_url: "https://github.com/igor-mircic/prod-ready-social-media-v2/blob/main/infra/runbooks/PostgresDeadlocks.md"
