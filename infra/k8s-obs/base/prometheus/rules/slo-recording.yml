# SLO recording rules — canonical per-window error / slow-request ratios.
#
# Names follow Prometheus's <level>:<metric>:<operation> convention with
# `level=job`. The alerting rules in slo-alerting.yml reference these series
# instead of recomputing the underlying rate() each evaluation.
#
# Windows: 5m, 30m, 1h, 6h, 3d. Each window is needed by at least one of the
# Google-SRE-Workbook multi-window multi-burn-rate pairs:
#   fast page : 1h × 5m
#   slow page : 6h × 30m
#   ticket    : 3d × 6h
#
# The `_bucket{le="..."}` histogram series for the latency SLIs are emitted
# because `application.yaml` enables `percentiles-histogram` on the
# `feed.read.duration` and `posts.create.duration` Micrometer Timers.
groups:
  - name: slo_api_availability
    interval: 30s
    rules:
      - record: job:slo_api_availability:errors_ratio_rate5m
        expr: |
          sum(rate(http_server_requests_seconds_count{job="backend", uri=~"/api/v1/.*", status=~"5.."}[5m]))
          /
          sum(rate(http_server_requests_seconds_count{job="backend", uri=~"/api/v1/.*"}[5m]))
        labels:
          job: backend
      - record: job:slo_api_availability:errors_ratio_rate30m
        expr: |
          sum(rate(http_server_requests_seconds_count{job="backend", uri=~"/api/v1/.*", status=~"5.."}[30m]))
          /
          sum(rate(http_server_requests_seconds_count{job="backend", uri=~"/api/v1/.*"}[30m]))
        labels:
          job: backend
      - record: job:slo_api_availability:errors_ratio_rate1h
        expr: |
          sum(rate(http_server_requests_seconds_count{job="backend", uri=~"/api/v1/.*", status=~"5.."}[1h]))
          /
          sum(rate(http_server_requests_seconds_count{job="backend", uri=~"/api/v1/.*"}[1h]))
        labels:
          job: backend
      - record: job:slo_api_availability:errors_ratio_rate6h
        expr: |
          sum(rate(http_server_requests_seconds_count{job="backend", uri=~"/api/v1/.*", status=~"5.."}[6h]))
          /
          sum(rate(http_server_requests_seconds_count{job="backend", uri=~"/api/v1/.*"}[6h]))
        labels:
          job: backend
      - record: job:slo_api_availability:errors_ratio_rate3d
        expr: |
          sum(rate(http_server_requests_seconds_count{job="backend", uri=~"/api/v1/.*", status=~"5.."}[3d]))
          /
          sum(rate(http_server_requests_seconds_count{job="backend", uri=~"/api/v1/.*"}[3d]))
        labels:
          job: backend

  - name: slo_feed_read_latency
    interval: 30s
    rules:
      # SLI: "fraction of feed-read requests slower than 200ms".
      # good = requests in the le="0.2" histogram bucket (already cumulative).
      # bad-ratio = 1 - good/total.
      - record: job:slo_feed_read_latency:slow_ratio_rate5m
        expr: |
          1 - (
            sum(rate(feed_read_duration_seconds_bucket{job="backend", le="0.2"}[5m]))
            /
            sum(rate(feed_read_duration_seconds_count{job="backend"}[5m]))
          )
        labels:
          job: backend
      - record: job:slo_feed_read_latency:slow_ratio_rate30m
        expr: |
          1 - (
            sum(rate(feed_read_duration_seconds_bucket{job="backend", le="0.2"}[30m]))
            /
            sum(rate(feed_read_duration_seconds_count{job="backend"}[30m]))
          )
        labels:
          job: backend
      - record: job:slo_feed_read_latency:slow_ratio_rate1h
        expr: |
          1 - (
            sum(rate(feed_read_duration_seconds_bucket{job="backend", le="0.2"}[1h]))
            /
            sum(rate(feed_read_duration_seconds_count{job="backend"}[1h]))
          )
        labels:
          job: backend
      - record: job:slo_feed_read_latency:slow_ratio_rate6h
        expr: |
          1 - (
            sum(rate(feed_read_duration_seconds_bucket{job="backend", le="0.2"}[6h]))
            /
            sum(rate(feed_read_duration_seconds_count{job="backend"}[6h]))
          )
        labels:
          job: backend
      - record: job:slo_feed_read_latency:slow_ratio_rate3d
        expr: |
          1 - (
            sum(rate(feed_read_duration_seconds_bucket{job="backend", le="0.2"}[3d]))
            /
            sum(rate(feed_read_duration_seconds_count{job="backend"}[3d]))
          )
        labels:
          job: backend

  - name: slo_post_create_latency
    interval: 30s
    rules:
      # SLI: "fraction of post-create requests slower than 500ms".
      - record: job:slo_post_create_latency:slow_ratio_rate5m
        expr: |
          1 - (
            sum(rate(posts_create_duration_seconds_bucket{job="backend", le="0.5"}[5m]))
            /
            sum(rate(posts_create_duration_seconds_count{job="backend"}[5m]))
          )
        labels:
          job: backend
      - record: job:slo_post_create_latency:slow_ratio_rate30m
        expr: |
          1 - (
            sum(rate(posts_create_duration_seconds_bucket{job="backend", le="0.5"}[30m]))
            /
            sum(rate(posts_create_duration_seconds_count{job="backend"}[30m]))
          )
        labels:
          job: backend
      - record: job:slo_post_create_latency:slow_ratio_rate1h
        expr: |
          1 - (
            sum(rate(posts_create_duration_seconds_bucket{job="backend", le="0.5"}[1h]))
            /
            sum(rate(posts_create_duration_seconds_count{job="backend"}[1h]))
          )
        labels:
          job: backend
      - record: job:slo_post_create_latency:slow_ratio_rate6h
        expr: |
          1 - (
            sum(rate(posts_create_duration_seconds_bucket{job="backend", le="0.5"}[6h]))
            /
            sum(rate(posts_create_duration_seconds_count{job="backend"}[6h]))
          )
        labels:
          job: backend
      - record: job:slo_post_create_latency:slow_ratio_rate3d
        expr: |
          1 - (
            sum(rate(posts_create_duration_seconds_bucket{job="backend", le="0.5"}[3d]))
            /
            sum(rate(posts_create_duration_seconds_count{job="backend"}[3d]))
          )
        labels:
          job: backend
