# promtool test rules — executable spec for the container-saturation
# alerts authored by `add-k8s-container-saturation-alerts`.
#
# Replaces the historical-record fixture that slice 22b carried (cAdvisor-
# keyed assertions against deleted rules). The cAdvisor content has been
# deleted in this slice; the file name is reused for the new fixture
# (design.md Decision 4).
#
# Rules under test (see ../rules/container-alerts.yml):
#   - ContainerCpuLimitNearExhaustion — k8s_container_cpu_limit_utilization_ratio > 0.9 for 5m
#   - ContainerMemoryNearLimit        — k8s_container_memory_limit_utilization_ratio > 0.9 for 5m
#   - ContainerRestartingFrequently   — increase(k8s_container_restarts[5m]) > 1 (no for-window)
#
# Coverage maps spec scenarios one-for-one:
#   - Cpu/Memory : 0.95 sustained for >5m fires; 0.85 sustained does not.
#   - Restarts   : counter incrementing every minute (>1 over 5m) fires;
#                  a single one-shot restart inside the window does not.
#
# Run locally (matches the CI invocation):
#   docker run --rm --entrypoint promtool \
#     -v "$PWD/infra/k8s-obs/base/prometheus:/prometheus:ro" \
#     prom/prometheus:v2.55.1 test rules /prometheus/tests/container-tests.yml
rule_files:
  - ../rules/container-alerts.yml

evaluation_interval: 1m

tests:
  # ---------------------------------------------------------------------------
  # 1. ContainerCpuLimitNearExhaustion — utilisation 0.95 sustained for >5m.
  # `for: 5m` requires the breach to hold for 5 minutes; eval at 7m gives
  # the for-window time to elapse with margin.
  # ---------------------------------------------------------------------------
  - interval: 1m
    input_series:
      - series: 'k8s_container_cpu_limit_utilization_ratio{k8s_namespace_name="social",k8s_pod_name="backend-abc",k8s_container_name="backend"}'
        values: '0.95x10'
    alert_rule_test:
      - eval_time: 7m
        alertname: ContainerCpuLimitNearExhaustion
        exp_alerts:
          - exp_labels:
              k8s_namespace_name: social
              k8s_pod_name: backend-abc
              k8s_container_name: backend
              severity: page
              slo: container_cpu
            exp_annotations:
              summary: "Container social/backend sustained >90% of its CPU limit for 5m."
              description: "Container `social/backend-abc/backend` has held CPU utilisation above 90% of its declared CPU limit for at least 5 minutes. The kernel CFS scheduler will throttle the container on burst, inflating wall-clock latency for any work it does; raise the limit, right-size the workload, or scale out. See the runbook for the proxy-vs-throttling relationship."
              runbook_url: "https://github.com/igor-mircic/prod-ready-social-media-v2/blob/main/infra/runbooks/ContainerCpuLimitNearExhaustion.md"

  # ---------------------------------------------------------------------------
  # 2. ContainerCpuLimitNearExhaustion — utilisation 0.85 sustained. Expr
  # `> 0.9` is false at every sample → alert never enters pending; no fire.
  # ---------------------------------------------------------------------------
  - interval: 1m
    input_series:
      - series: 'k8s_container_cpu_limit_utilization_ratio{k8s_namespace_name="social",k8s_pod_name="backend-abc",k8s_container_name="backend"}'
        values: '0.85x10'
    alert_rule_test:
      - eval_time: 7m
        alertname: ContainerCpuLimitNearExhaustion
        exp_alerts: []

  # ---------------------------------------------------------------------------
  # 3. ContainerMemoryNearLimit — working-set ratio 0.95 sustained for >5m.
  # Same shape as the CPU rule; same eval timing.
  # ---------------------------------------------------------------------------
  - interval: 1m
    input_series:
      - series: 'k8s_container_memory_limit_utilization_ratio{k8s_namespace_name="social",k8s_pod_name="postgres-0",k8s_container_name="postgres"}'
        values: '0.95x10'
    alert_rule_test:
      - eval_time: 7m
        alertname: ContainerMemoryNearLimit
        exp_alerts:
          - exp_labels:
              k8s_namespace_name: social
              k8s_pod_name: postgres-0
              k8s_container_name: postgres
              severity: page
              slo: container_memory
            exp_annotations:
              summary: "Container social/postgres working set >90% of its memory limit for 5m."
              description: "Container `social/postgres-0/postgres` has held memory working set above 90% of its declared memory limit for at least 5 minutes. The Linux OOM killer will engage soon if the trend continues; raise the cap, fix the leak, or scale out. See the runbook."
              runbook_url: "https://github.com/igor-mircic/prod-ready-social-media-v2/blob/main/infra/runbooks/ContainerMemoryNearLimit.md"

  # ---------------------------------------------------------------------------
  # 4. ContainerMemoryNearLimit — working-set ratio 0.85 sustained. Expr
  # `> 0.9` is false at every sample → no fire.
  # ---------------------------------------------------------------------------
  - interval: 1m
    input_series:
      - series: 'k8s_container_memory_limit_utilization_ratio{k8s_namespace_name="social",k8s_pod_name="postgres-0",k8s_container_name="postgres"}'
        values: '0.85x10'
    alert_rule_test:
      - eval_time: 7m
        alertname: ContainerMemoryNearLimit
        exp_alerts: []

  # ---------------------------------------------------------------------------
  # 5. ContainerRestartingFrequently — counter incrementing by 1 every
  # minute. `increase(k8s_container_restarts[5m])` at eval 7m covers the
  # window [2m, 7m] which sees a delta of 5 > 1 → alert fires immediately
  # (no for-window).
  # ---------------------------------------------------------------------------
  - interval: 1m
    input_series:
      - series: 'k8s_container_restarts{k8s_namespace_name="social",k8s_pod_name="frontend-xyz",k8s_container_name="frontend"}'
        values: '0+1x10'
    alert_rule_test:
      - eval_time: 7m
        alertname: ContainerRestartingFrequently
        exp_alerts:
          - exp_labels:
              k8s_namespace_name: social
              k8s_pod_name: frontend-xyz
              k8s_container_name: frontend
              severity: page
              slo: container_restarts
            exp_annotations:
              summary: "Container social/frontend restarted more than once in the last 5m."
              description: "Container `social/frontend-xyz/frontend` has restarted more than once in the last 5 minutes — a restart loop. The OTel families do not surface the termination reason; the runbook walks the operator through `kubectl describe pod` (Last State), `kubectl logs --previous`, and the loki kubelet stream for OOM-kill log lines."
              runbook_url: "https://github.com/igor-mircic/prod-ready-social-media-v2/blob/main/infra/runbooks/ContainerRestartingFrequently.md"

  # ---------------------------------------------------------------------------
  # 6. ContainerRestartingFrequently — a single one-shot restart inside
  # the 5m window. Counter is 0 for the first 5 minutes, then 1 for the
  # remainder. At eval 8m the window [3m, 8m] sees a delta of 1; `> 1`
  # is false; no fire. (Captures the spec's "single startup restart is
  # not a loop" intent.)
  # ---------------------------------------------------------------------------
  - interval: 1m
    input_series:
      - series: 'k8s_container_restarts{k8s_namespace_name="social",k8s_pod_name="frontend-xyz",k8s_container_name="frontend"}'
        values: '0x5 1x10'
    alert_rule_test:
      - eval_time: 8m
        alertname: ContainerRestartingFrequently
        exp_alerts: []
