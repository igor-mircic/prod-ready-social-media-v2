# prometheus-community/prometheus chart values for slice 17
# (add-local-k3s-obs-cluster), updated by slice 21
# (add-k3s-cluster-metrics). Chart pin: 29.6.0 (app v3.11.3).
#
# This is bare Prometheus — no Operator, no CRDs. Every default
# scrape job stays disabled and every bundled subchart stays
# disabled. The data path is push-based: the app-cluster gateway
# collector dual-writes metrics via `prometheusremotewrite` (the
# obs collector's `prometheusremotewrite/in-cluster` exporter
# was wired in slice 18c and the remote-write receiver on this
# prometheus was enabled in the same slice — see
# `web.enable-remote-write-receiver` in `extraFlags:` below).
#
# Slice 21 (add-k3s-cluster-metrics) added two OTel producers on
# the app cluster — a `metrics-agent` DaemonSet (kubeletstats +
# hostmetrics receivers — per-node CPU/memory/disk/load and per-
# pod CPU/memory) and a `metrics-cluster-agent` Deployment
# (k8s_cluster receiver — cluster-state metrics like deployment
# desired/available, pod phase, container restarts, PVC phase).
# Both ship plaintext OTLP/gRPC to the app-cluster gateway, which
# carries them through the slice-19 mTLS envelope to this
# prometheus' remote-write endpoint. This is the OTel-receiver-
# side approach (design.md Decision 2): it replaces what
# `kube-state-metrics` and `prometheus-node-exporter` subcharts
# would have provided and obviates the default chart-side
# scrape jobs. Cross-cluster flow stays one-directional
# (app -> obs) and shares the single security envelope at the
# gateway.

server:
  persistentVolume:
    enabled: true
    size: 5Gi
    # k3s ships local-path-provisioner as the default StorageClass;
    # pin it explicitly so a fresh cluster does not depend on the
    # chart's auto-detection.
    storageClass: local-path
  # 7 days retention matches the 5Gi PVC envelope at the current
  # ingest rate. Slice 21 (add-k3s-cluster-metrics) lands the
  # first real cluster-metric volume via the gateway's
  # remote-write — measure-then-tune in a later slice as the
  # series count settles. The Hetzner overlay stub flags both
  # PVC size and retention as production-side re-sizing items.
  retention: "7d"
  # Slice 18c: enable the remote-write receiver so the obs collector's
  # `prometheusremotewrite/in-cluster` exporter has a destination at
  # `POST /api/v1/write` on the chart-default prometheus-server
  # Service. `web.enable-remote-write-receiver` is the modern flag
  # name (pre-v2.33 docs reference `enable-feature=remote-write-receiver`;
  # both work on v3.11.3 but the explicit web flag is clearer).
  # `web.enable-lifecycle` is the chart default — keep it.
  extraFlags:
    - web.enable-lifecycle
    - web.enable-remote-write-receiver
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 1Gi
      cpu: 1000m

  # Slice 22a (migrate-obs-content): mount the kustomize-generated
  # `prometheus-extra-rules` ConfigMap (sibling kustomization.yaml's
  # configMapGenerator) at `/etc/prometheus-extra-rules/`. The chart
  # appends `mountPath` to the prometheus container's volumeMounts
  # and `configMap.name` to the pod's volumes. Read-only by chart
  # default.
  extraConfigmapMounts:
    - name: prometheus-extra-rules
      mountPath: /etc/prometheus-extra-rules
      subPath: ""
      configMap: prometheus-extra-rules
      readOnly: true

  # Slice 22a (migrate-obs-content): the slice-17 obs prometheus
  # was stood up with no alertmanager target — `rule_files:` could
  # be set, but firings had no receiver. The migrated routing tree
  # in `../alertmanager/values.yaml` is now the receiver of record;
  # wire it as a single static-config target. The slice-19 mTLS
  # envelope is cross-cluster only; prometheus → alertmanager stays
  # plaintext in-cluster on `:9093`.
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager.observability.svc.cluster.local:9093

# Slice 22a (migrate-obs-content): override the chart-default
# `rule_files:` list to APPEND the migrated rule files mount.
# The chart's default values.yaml ships
# `/etc/config/recording_rules.yml` and `/etc/config/alerting_rules.yml`
# (both empty by default — the chart writes them from
# `serverFiles.recording_rules.yml` / `alerting_rules.yml`,
# which we leave unset). PRESERVE those so a future slice that
# wants to add inline rules through serverFiles still works,
# then append `/etc/prometheus-extra-rules/*.yml` (the slice-22a
# mount). Helm's deep-merge replaces the entire list when both
# sides declare `rule_files:`, so the chart defaults must be
# restated explicitly.
serverFiles:
  prometheus.yml:
    rule_files:
      - /etc/config/recording_rules.yml
      - /etc/config/alerting_rules.yml
      - /etc/prometheus-extra-rules/*.yml

# Alertmanager is its own top-level chart in
# infra/k8s-obs/base/alertmanager/. The prometheus chart's bundled
# alertmanager subchart is explicitly disabled to avoid two
# alertmanagers in the same namespace.
alertmanager:
  enabled: false

# Out of scope this slice — the project's observability model is
# push-only (app → obs), not pull-from-host metric submission.
# Subchart name in the prometheus chart is `prometheus-pushgateway`
# (matches the chart's `dependencies:` declaration).
prometheus-pushgateway:
  enabled: false

# Both subcharts stay disabled — slice 21 (add-k3s-cluster-metrics)
# chose the OTel-receiver-side path. The app-cluster
# metrics-cluster-agent's `k8s_cluster` receiver covers what
# `kube-state-metrics` would have emitted (deployment desired /
# available, pod phase, restart counters, PVC phase), and the
# metrics-agent's `hostmetrics` receiver covers what
# `prometheus-node-exporter` would have emitted (node CPU,
# memory, disk, network, load, paging). Data arrives via the
# gateway's remote-write fan-out (see header). Re-enabling
# either subchart would inverts the cross-cluster data flow
# (this prom pulling from the app cluster) and is not the
# intended path.
kube-state-metrics:
  enabled: false
prometheus-node-exporter:
  enabled: false

# Scrape configs — every default job explicitly disabled. The
# chart ships a `scrapeConfigs:` dictionary keyed by job name
# (prometheus self-scrape, kubernetes-apiservers, kubernetes-nodes,
# kubelet/cAdvisor, kubernetes-service-endpoints,
# kubernetes-service-endpoints-slow, prometheus-pushgateway,
# kubernetes-services, kubernetes-pods, kubernetes-pods-slow).
# Helm's deep-merge means setting `scrapeConfigs: {}` only adds an
# empty map ON TOP of the defaults — it does NOT wipe them. Each
# default job has to be disabled by key, which is what the chart's
# `{{- if $scrapeValue.enabled }}` template check honors.
#
# Every job stays disabled — slice 21 (add-k3s-cluster-metrics)
# chose the OTel-receiver-side path. Data arrives via the
# gateway's remote-write (header). Re-enabling any of these
# jobs would inverts the cross-cluster data flow (this prom
# pulling from the app cluster's kubelet / apiserver / pod
# endpoints) and demand a second auth model on top of the
# slice-19 mTLS envelope — explicitly not the design.
scrapeConfigs:
  prometheus:
    enabled: false
  kubernetes-api-servers:
    enabled: false
  kubernetes-nodes:
    enabled: false
  kubernetes-nodes-cadvisor:
    enabled: false
  kubernetes-service-endpoints:
    enabled: false
  kubernetes-service-endpoints-slow:
    enabled: false
  prometheus-pushgateway:
    enabled: false
  kubernetes-services:
    enabled: false
  kubernetes-pods:
    enabled: false
  kubernetes-pods-slow:
    enabled: false
