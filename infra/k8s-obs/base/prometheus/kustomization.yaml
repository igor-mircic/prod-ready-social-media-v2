# Prometheus workload — the prometheus-community `prometheus` chart
# wrapped by Kustomize via the `helmCharts:` directive. Rendered
# with `kustomize build --enable-helm` (the `just obs-apply` recipe
# wraps the flag).
#
# Deliberately NOT `kube-prometheus-stack`. This slice deploys bare
# Prometheus (no Operator, no CRDs); see
# openspec/changes/add-local-k3s-obs-cluster/design.md Decision 3
# for the rationale. Scrape configs are owned in values.yaml as
# plain YAML, not via ServiceMonitor / PodMonitor CRDs.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
- name: prometheus
  repo: https://prometheus-community.github.io/helm-charts
  # Chart version pin. Resolved against the active
  # prometheus-community release at slice authoring (2026-05-16).
  # Bumping is a deliberate edit to this file.
  version: 29.6.0
  releaseName: prometheus
  namespace: observability
  valuesFile: values.yaml

# Slice 22a (migrate-obs-content): wrap every rule `.yml` file
# under ./rules/ in a `prometheus-extra-rules` ConfigMap, then
# mount it into the prometheus pod at `/etc/prometheus-extra-rules/`
# via values.yaml's `server.extraConfigmapMounts:`. The chart's
# `serverFiles.prometheus.yml.rule_files:` is extended in the
# same values file to APPEND `/etc/prometheus-extra-rules/*.yml`
# so prometheus loads the migrated groups at startup alongside
# the chart-default `/etc/config/{recording,alerting}_rules.yml`.
#
# `disableNameSuffixHash: true` keeps the ConfigMap name stable
# across re-renders so the values.yaml `extraConfigmapMounts.configMap`
# reference resolves to the same name on every apply. Kubelet
# does NOT auto-restart pods when a mounted ConfigMap's data
# changes; rule edits are picked up via
# `kubectl --context social-obs -n observability rollout
# restart sts/prometheus-server` — same posture every other
# slice's chart-mounted ConfigMaps take (slice 21 grafana
# dashboardsConfigMaps).
configMapGenerator:
  - name: prometheus-extra-rules
    files:
      - rules/slo-recording.yml
      - rules/slo-alerting.yml
      - rules/fe-slo-recording.yml
      - rules/fe-slo-alerting.yml
      - rules/database-alerts.yml
    options:
      disableNameSuffixHash: true
