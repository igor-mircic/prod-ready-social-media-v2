# Hetzner overlay — PLACEHOLDER for the next slice
# (add-hetzner-deploy).
#
# TODO (add-hetzner-deploy): the next slice will fill this overlay
# in with the production-grade counterparts of the base resources:
#
#   - Replace the base postgres Secret with a Hetzner-safe Secret
#     strategy (SOPS-encrypted-at-rest, Sealed Secrets controller,
#     or imperative kubectl-from-password-manager — decision pending
#     in the next slice). The plain Secret committed under
#     infra/k8s/base/postgres/secret.yaml is a LOCAL-DEV credential
#     and MUST NOT be reused on this overlay path. The slice will
#     either remove the base secret and add a Hetzner-specific one,
#     or replace the base secret via a strategic-merge patch that
#     points at a different `existingSecret` name.
#   - Add HetznerCloud LoadBalancer annotations on the postgres-lb
#     Service (or replace it entirely if external access is gated
#     differently — e.g. WireGuard-only access from the developer's
#     machine).
#   - Re-size primary.persistence (production capacity well above
#     the local 5Gi).
#   - Re-size primary.resources.requests/limits to the CAX21
#     envelope (4 vCPU shared, 8 GiB RAM minus k3s overhead).
#
# Slice 15 (add-local-k3s-backend) — the next slice
# (add-hetzner-deploy) will plug the backend pieces in here:
#
#   - Strategic-merge patch on the backend Deployment swapping the
#     image reference from `registry.local:5000/backend:dev` (local
#     overlay's floating tag) to a digest-pinned production tag
#     served from ghcr.io, e.g.
#     `ghcr.io/<owner>/backend@sha256:<digest>`. The local registry
#     and its `registries.yaml` mirror do not exist on the Hetzner
#     box; pulls come from ghcr.io directly.
#   - `imagePullSecrets: [{ name: ghcr-pull }]` on the Deployment's
#     pod spec, populated from a Secret created out-of-band via the
#     Hetzner slice's bootstrap script (a Personal Access Token /
#     fine-grained GitHub token with `read:packages` only). The
#     Secret intentionally does NOT ship in this repo.
#   - Tighter probe timings: `startupProbe.failureThreshold` lower
#     (the CAX21 cold start is faster than a busy laptop), `livenessProbe.timeoutSeconds`
#     explicit at 2s, `readinessProbe.periodSeconds` perhaps 10s for
#     reduced load on the apiserver. Final numbers measured on the
#     real box, not guessed here.
#   - Production resource caps: requests `cpu: 500m / memory: 1Gi`,
#     limits `cpu: 2000m / memory: 2Gi` — fills more of the CAX21
#     envelope than the local overlay's tighter defaults. The exact
#     numbers will be tuned against observed steady-state usage; the
#     base manifest's defaults are kept conservative so a Hetzner
#     misconfiguration does not OOM by accident.
#   - Replica count: starts at 1 (single-node cluster, single CAX21
#     box). Bumps to 2 only after the cluster grows a second node or
#     CAX21 is replaced by a larger SKU; HPA / topology constraints
#     do not exist in this slice or the next.
#   - OTLP endpoint override: replace `http://host.lima.internal:4318`
#     (the local-overlay transitional target) with the production
#     collector's address. Whether the production collector lives in
#     k3s (in-cluster Service DNS) or off-cluster (Grafana Cloud OTLP
#     endpoint behind an API token) is the next slice's open
#     question. Either way the override lives here, not in base.
#
# Slice 16 (add-local-k3s-frontend) — the next slice
# (add-hetzner-deploy) will plug the frontend pieces in here:
#
#   - Strategic-merge patch on the frontend Deployment swapping the
#     image reference from `registry.local:5000/frontend:dev` (local
#     overlay's floating tag) to a digest-pinned production tag
#     served from ghcr.io, e.g.
#     `ghcr.io/<owner>/frontend@sha256:<digest>`. The local registry
#     and its `registries.yaml` mirror do not exist on the Hetzner
#     box; pulls come from ghcr.io directly.
#   - `imagePullSecrets: [{ name: ghcr-pull }]` reuses the same
#     Secret slice 15's backend stub introduces (one `read:packages`
#     token scoped to ghcr.io covers both images).
#   - `imagePullPolicy: IfNotPresent` (the default) — digest-pinned
#     tags mean re-pulling adds nothing. The local overlay's `Always`
#     patch is intentionally NOT inherited here.
#   - Build-time Vite env rebake for production URLs: the production
#     image rebuilds with `--build-arg VITE_API_BASE_URL=''` (if
#     same-origin Ingress) or `https://api.<host>` (if split origins),
#     `--build-arg VITE_OTEL_TRACES_ENDPOINT=...` (production
#     collector address). The `/config.js` runtime-injection spike
#     (design.md "Open Questions") would remove this rebuild step;
#     until then each environment gets its own image build.
#   - Resource caps: likely unchanged. nginx idles at ~5 MiB; the
#     base manifest's 200m/128Mi limits are comfortable on the CAX21
#     envelope. Tighten only if observed steady-state usage justifies.
#   - Probe timings: likely unchanged. Sub-second nginx start makes
#     the base probe timings appropriate everywhere.
#   - TLS / DNS / Ingress: a future `add-cluster-ingress` slice owns
#     the decision between Traefik (k3s default) and ingress-nginx.
#     Once landed, the Hetzner frontend Service gets an Ingress
#     resource pointing the production hostname at the same-origin
#     `/` path.
#
# Slice 18a/18b (add-k3s-app-collector, bridge-collectors-to-obs-cluster)
# — the next slice (add-hetzner-deploy) will plug the collector
# pieces in here:
#
#   - Production resource caps on the collector container.
#     Probably `requests: cpu=100m / memory=256Mi`, `limits:
#     cpu=1000m / memory=512Mi` — generous enough to absorb a
#     fleet's worth of OTLP traffic; the local overlay's
#     50m/128m..500m/256m envelope assumes a single-developer
#     span volume.
#   - OTLP exporter endpoint override on the collector config:
#     replace `host.lima.internal:14317` (the local mirror, slice
#     18b) on the `otlp/obs-cluster` exporter with the obs box's
#     tailscale / private-network IP terminated with mTLS. Slice
#     19 (`add-cross-cluster-mtls`) lands the cert material;
#     until then this overlay is comments-only.
#   - DROP the `otlp/compose-relay` exporter entirely (slice 18b's
#     dual-write is LOCAL-ONLY and MUST NOT be inherited by the
#     Hetzner deploy; the compose collector does not exist in
#     prod, and doubling outbound trace volume from the app
#     cluster in prod is a non-trivial bandwidth cost). Slice 22
#     (`retire-compose-observability`) collapses dual-write to
#     single-exporter at the BASE level before any Hetzner
#     cutover; this stub is the defence-in-depth reminder.
#   - TLS / mTLS material reference: a Secret holding the
#     collector's client cert + key for the cross-cluster export,
#     mounted into the pod via `volumes:` + `volumeMounts:` and
#     wired into the exporter's `tls.cert_file` / `tls.key_file` /
#     `tls.ca_file` fields. The Secret is created out-of-band by
#     the Hetzner slice's bootstrap script (cert-manager + a
#     self-signed CA shared with the obs cluster — slice 19's
#     decision).
#   - Tighter probe timings: `livenessProbe.timeoutSeconds`
#     explicit at 1s, `readinessProbe.periodSeconds` perhaps 3s,
#     `livenessProbe.initialDelaySeconds` lower (the contrib
#     collector starts in well under a second on the CAX21
#     envelope). Final numbers measured on the real box.
#   - Anti-affinity / pod topology constraints: the local
#     overlay's single-replica posture is fine on a single-node
#     Lima VM, but the Hetzner slice may grow the collector to
#     2 replicas with a PodDisruptionBudget once the cluster
#     gains a second node. Anti-affinity is a no-op on a
#     single-node cluster; capture the spec when the cluster
#     grows.
#
# Apply path is intentionally NOT wired into the justfile until the
# Hetzner slice lands. `just k8s-apply` targets overlays/local only.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base
