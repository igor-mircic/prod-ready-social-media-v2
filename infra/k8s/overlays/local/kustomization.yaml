# Local overlay — targets the Lima-hosted single-node k3s cluster.
#
# Inherits everything from ../../base. Local-specific patches go
# here. The slice's PVC size (5Gi), storage class (local-path), and
# resource caps (256Mi-1Gi memory, 0.25-2 CPU) are already declared
# at base/postgres/values.yaml; they match local-dev intent today, so
# this overlay carries no postgres-specific override patches. If/when
# the base values tighten to production-realistic shapes (larger PVC,
# bigger requests for the CAX21 envelope), this overlay is where the
# laptop-scaled-down counterpatches will land.
#
# Slice 15 (add-local-k3s-backend): the backend container's
# `imagePullPolicy` is patched to `Always` in this overlay so that
# iterating on the floating `:dev` tag (rebuilt + repushed by `just
# backend-image`) picks up new content without a digest swap. The
# Hetzner overlay deliberately does NOT patch this — production
# deploys pin by digest and rely on the default `IfNotPresent`.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: backend
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: backend
      spec:
        template:
          spec:
            containers:
              - name: backend
                imagePullPolicy: Always
