# Slice 21 (add-k3s-cluster-metrics). Identity the metrics-agent
# DaemonSet's pod runs as. The matching ClusterRole +
# ClusterRoleBinding live in rbac.yaml — cluster-scoped read on
# nodes/stats, nodes/proxy, nodes is the documented minimum for
# the kubeletstats receiver to dial the local kubelet via the
# node name resolution path. No Secret or token is created here;
# the projected-token mechanism mounts a short-lived bound token
# automatically.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: metrics-agent
