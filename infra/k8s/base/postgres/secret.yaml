# Local-development postgres credentials.
#
# THIS IS A LOCAL-DEV CREDENTIAL. The base64-encoded value below
# decodes to the same `social` string that has lived in
# docker-compose.yml since slice 0 — committing it here does not
# increase the exposure surface. The Hetzner overlay
# (infra/k8s/overlays/hetzner/kustomization.yaml) MUST NOT reuse
# this Secret; the placeholder there spells the substitution out.
#
# The Secret name MUST match the `auth.existingSecret` reference in
# infra/k8s/base/postgres/values.yaml. The data keys
# (`postgres-password` for the superuser, `password` for the custom
# `social` user) match the Bitnami chart's default `auth.secretKeys`.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  labels:
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/instance: postgres
    app.kubernetes.io/component: primary
    # Defence-in-depth marker so a grep / kustomize search makes it
    # obvious this is a local-only credential. The Hetzner overlay
    # will not carry a Secret with this label value.
    social.io/credential-scope: local-dev
  annotations:
    social.io/secret-policy: |-
      Local-dev credential only. Equivalent to the value in
      docker-compose.yml since slice 0. Hetzner overlay MUST replace.
type: Opaque
data:
  # `social` base64-encoded. Decode: `echo c29jaWFs | base64 -d`.
  postgres-password: c29jaWFs
  password: c29jaWFs
