# postgres-exporter Service — ClusterIP on :9187 (slice 22a,
# migrate-obs-content). The app collector's slice-22a
# `prometheus/postgres-exporter` receiver scrapes
# `postgres-exporter.social.svc.cluster.local:9187/metrics`;
# no NodePort or LoadBalancer is required because the only
# consumer lives in the same namespace.
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: postgres-exporter
  ports:
    - name: metrics
      port: 9187
      targetPort: metrics
      protocol: TCP
