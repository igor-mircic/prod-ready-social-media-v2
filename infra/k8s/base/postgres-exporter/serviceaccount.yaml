# ServiceAccount for the postgres-exporter pod (slice 22a,
# migrate-obs-content). Empty ServiceAccount — no Role or
# RoleBinding in this slice; the exporter only dials the
# in-cluster postgres on :5432 and serves Prometheus-format
# metrics on :9187. No apiserver verbs are needed. Compose's
# postgres-exporter does not run with a ServiceAccount either
# (it is a docker container); the k8s equivalent declares one
# explicitly so the pod runs under a named identity rather than
# the namespace's `default` SA — this keeps a future RBAC slice
# (e.g. a `pg_monitor`-granted DB role per Hetzner overlay stub)
# scoped to this workload without retargeting `default`.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: postgres-exporter
