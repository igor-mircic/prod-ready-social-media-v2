# postgres-exporter Deployment (slice 22a, migrate-obs-content).
# Single replica, in the `social` namespace (inherited from
# `infra/k8s/base/kustomization.yaml`'s `namespace:`).
#
# Mirrors the compose `postgres-exporter` service (docker-
# compose.yml). The image tag is byte-identical to compose
# (`quay.io/prometheuscommunity/postgres-exporter:v0.17.1`) so
# the parity window can confirm both prometheus instances emit
# the same metric families under the same labels.
#
# Connection target: postgres.social.svc.cluster.local:5432
# (the Bitnami chart's ClusterIP Service), NOT the slice-14
# `postgres-lb` LoadBalancer — LoadBalancer is for the host
# loop only. The pod loads `social`/`social` credentials from
# the existing `postgres-credentials` Secret (slice 14 / 15)
# — same Secret + same key names the backend uses. A future
# Hetzner deploy SHALL substitute a `pg_monitor`-granted role
# (called out in `infra/k8s/overlays/hetzner/kustomization.yaml`).
#
# Custom queries: `pg_stat_statements` projection comes from
# `infra/k8s/base/postgres-exporter/queries.yaml` (sibling of
# this Deployment; relocated to its consumer-local home in
# slice 22b). The kustomize `configMapGenerator` in the sibling
# `kustomization.yaml` materialises it into a ConfigMap mounted
# at `/etc/postgres-exporter/`.
#
# Probes use the bare `/` path on the metrics port. The
# `postgres-exporter` image's root path returns a small HTML
# landing page (200 OK) — sufficient for readiness/liveness
# without a separate `/healthz` route.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres-exporter
    spec:
      serviceAccountName: postgres-exporter
      containers:
        - name: postgres-exporter
          image: quay.io/prometheuscommunity/postgres-exporter:v0.17.1
          ports:
            - name: metrics
              containerPort: 9187
              protocol: TCP
          env:
            - name: DATA_SOURCE_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: username
            - name: DATA_SOURCE_PASS
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: password
            - name: DATA_SOURCE_URI
              value: postgres.social.svc.cluster.local:5432/social?sslmode=disable
            - name: PG_EXPORTER_EXTEND_QUERY_PATH
              value: /etc/postgres-exporter/queries.yaml
          volumeMounts:
            - name: queries
              mountPath: /etc/postgres-exporter
              readOnly: true
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: queries
          configMap:
            name: postgres-exporter-queries
