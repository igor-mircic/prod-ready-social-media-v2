# Slice 21 (add-k3s-cluster-metrics). Identity the
# metrics-cluster-agent Deployment's pod runs as. The matching
# ClusterRole + ClusterRoleBinding live in rbac.yaml —
# cluster-scoped read on the resource kinds the `k8s_cluster`
# contrib receiver watches (events, namespaces, nodes, pods,
# PVCs, services, deployments, replicasets, statefulsets,
# daemonsets, jobs, cronjobs, HPAs). No Secret or token is
# created here; the projected-token mechanism mounts a
# short-lived bound token automatically.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: metrics-cluster-agent
