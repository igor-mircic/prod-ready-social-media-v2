# Slice 20 (add-k3s-pod-log-shipping). Identity the log-agent
# DaemonSet's pod runs as. The matching ClusterRole +
# ClusterRoleBinding live in rbac.yaml — cluster-scoped read on
# pods/namespaces/replicasets is the documented minimum for the
# k8sattributes processor to resolve any pod's metadata against
# the apiserver. No Secret or token is created here; the
# projected-token mechanism mounts a short-lived bound token
# automatically.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: log-agent
