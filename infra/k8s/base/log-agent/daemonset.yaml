# log-agent DaemonSet — slice 20 (add-k3s-pod-log-shipping).
# One pod per node; tolerates the control-plane taint so it
# schedules on the only node of a single-node k3s cluster
# AND on every worker on a future multi-node Hetzner cluster
# (design.md Decision 8). Mounts the host's /var/log/pods
# read-only and ships JSON-shaped backend stdout to the gateway
# collector.
#
# Image is referenced by name without an inline tag; the
# directory's `kustomization.yaml` `images:` directive resolves
# the tag (otel/opentelemetry-collector-contrib:0.111.0, same
# pin as the gateway collector and the obs cluster collector).
#
# Probes target the bundled `health_check` extension on :13133.
# The container does NOT expose any OTLP port — the agent is a
# client of the gateway, not a server.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: log-agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: log-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: log-agent
    spec:
      serviceAccountName: log-agent
      # Tolerate every taint (design.md Decision 8). On a single-
      # node k3s cluster the only node carries the control-plane
      # taint and the agent would not schedule without this. On a
      # multi-node cluster we still want a pod on every node
      # including taint-carrying control-plane masters — pod logs
      # live wherever the kubelet runs.
      tolerations:
        - operator: Exists
      containers:
        - name: log-agent
          image: otel/opentelemetry-collector-contrib
          args:
            - --config=/etc/otelcol-contrib/config.yaml
          ports:
            - name: healthcheck
              containerPort: 13133
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: healthcheck
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: healthcheck
            periodSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              # CPU limit lower than the gateway (500m) — the agent
              # parses + enriches per record but does no cross-
              # cluster TLS handshake or dual-write batching.
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /etc/otelcol-contrib
              readOnly: true
            # Host's per-pod log directory. Read-only — the agent
            # must never mutate kubelet-owned files.
            - name: varlogpods
              mountPath: /var/log/pods
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: log-agent-config
            items:
              - key: config.yaml
                path: config.yaml
        - name: varlogpods
          hostPath:
            path: /var/log/pods
            type: Directory
