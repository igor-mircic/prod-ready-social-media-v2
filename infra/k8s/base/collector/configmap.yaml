# In-cluster OpenTelemetry Collector pipeline (slice 18a / 18b / 18c / 19 / 22b).
#
# Three pipelines, each writing to a single obs-cluster destination:
#   OTLP receiver (gRPC :4317, HTTP :4318, NO CORS — in-cluster only,
#                  the frontend pod's nginx reverse-proxies `/v1/*`
#                  to this receiver per slice 18c)
#     -> batch
#     -> traces:  transform/redact-path-ids
#                 -> otlp/obs-cluster        (host.lima.internal:14317, mTLS)
#     -> logs:    transform/redact-path-ids, filter/exclude_observability_self
#                 -> otlphttp/obs-cluster-logs    (https://host.lima.internal:14318, mTLS)
#     -> metrics: (batch only; FE web-vitals have no PII / no path data)
#                 -> otlphttp/obs-cluster-metrics   (https://host.lima.internal:14318, mTLS)
#
# Slice 22b (`retire-compose-observability`) collapsed the slice-18a/18b/18c
# dual-write fan-out: the three `*compose-relay*` exporters (plaintext, targeting
# the now-deleted compose collector at `host.lima.internal:4317`/`:4318`) were
# removed in lock-step with the compose `observability` profile deletion. The
# three surviving `*obs-cluster*` exporters all carry mTLS against the shared
# self-signed CA (slice 19; cert material produced by `just obs-certs`,
# mounted at `/etc/otelcol-contrib/certs/` via a Kustomize secretGenerator-
# produced Secret).
#
# Slice 18b stood up the obs traces exporter alongside the compose-relay.
# Slice 18c added the logs and metrics legs symmetrically. Every browser
# OTLP signal arrives here via the FE pod's nginx `/v1/` reverse-proxy and
# is now forwarded to the obs cluster only.
#
# Two collectors share the `transform/redact-path-ids` OTTL block byte-for-byte:
#   - app cluster at this file
#   - obs cluster at `infra/k8s-obs/base/collector/configmap.yaml`
# If you edit one set of OTTL statements, you MUST edit the other in the
# same commit, otherwise BE-in-k3s traffic gets asymmetric redaction across
# destinations. Slice 18c targets `attributes["url.path"]` (the attribute
# the modern OTel Java agent actually emits) alongside the deprecated
# `http.url` / `http.target` / `url.full` keys for defence-in-depth.
apiVersion: v1
kind: ConfigMap
metadata:
  name: collector-config
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

      # Slice 22a (migrate-obs-content): scrape the in-cluster
      # postgres-exporter (`infra/k8s/base/postgres-exporter/`)
      # in Prometheus-format and emit OTLP internally so its
      # `pg_*` series flow through the same `batch` processor
      # as every other metric family. Joining the scrape here
      # (rather than as a native scrape job on the obs prom)
      # keeps the obs prom seeing the same `pg_*` series under
      # the same labels the compose prom saw pre-22b.
      #
      # Single target, single job — the contrib distribution
      # (image `otel/opentelemetry-collector-contrib:0.111.0`)
      # ships the `prometheus` receiver. Post-22b this remains
      # the only path delivering `pg_*` series to obs prom.
      prometheus/postgres-exporter:
        config:
          scrape_configs:
            - job_name: postgres-exporter
              scrape_interval: 15s
              metrics_path: /metrics
              static_configs:
                - targets:
                    - postgres-exporter.social.svc.cluster.local:9187

    processors:
      batch: {}

      # Mirrors the compose collector's redact-path-ids block.
      # Patterns, in order:
      #   1. UUID v4 (lowercase hex with hyphens).
      #   2. opaque hex segments of length 8+, bounded by `/` or
      #      end-of-string. The trailing delimiter is captured
      #      (`$$1`) because Go's RE2 has no lookahead.
      #   3. numeric segments of length 4+, bounded as above.
      # UUID must come first so its hex form is not eaten by the
      # opaque-hex rule. Replacement is uniform (`{id}`).
      transform/redact-path-ids:
        trace_statements:
          - context: span
            statements:
              - replace_pattern(name, "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}", "{id}")
              - replace_pattern(name, "/[0-9a-f]{8,}(/|$)", "/{id}$$1")
              - replace_pattern(name, "/[0-9]{4,}(/|$)", "/{id}$$1")
              - replace_pattern(attributes["http.url"], "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}", "{id}") where attributes["http.url"] != nil
              - replace_pattern(attributes["http.url"], "/[0-9a-f]{8,}(/|$)", "/{id}$$1") where attributes["http.url"] != nil
              - replace_pattern(attributes["http.url"], "/[0-9]{4,}(/|$)", "/{id}$$1") where attributes["http.url"] != nil
              - replace_pattern(attributes["http.target"], "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}", "{id}") where attributes["http.target"] != nil
              - replace_pattern(attributes["http.target"], "/[0-9a-f]{8,}(/|$)", "/{id}$$1") where attributes["http.target"] != nil
              - replace_pattern(attributes["http.target"], "/[0-9]{4,}(/|$)", "/{id}$$1") where attributes["http.target"] != nil
              - replace_pattern(attributes["url.full"], "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}", "{id}") where attributes["url.full"] != nil
              - replace_pattern(attributes["url.full"], "/[0-9a-f]{8,}(/|$)", "/{id}$$1") where attributes["url.full"] != nil
              - replace_pattern(attributes["url.full"], "/[0-9]{4,}(/|$)", "/{id}$$1") where attributes["url.full"] != nil
              # Slice 18c: target the attribute the modern OTel Java
              # agent actually emits. `http.url`/`http.target`/`url.full`
              # are kept for defence-in-depth against older
              # instrumentation.
              - replace_pattern(attributes["url.path"], "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}", "{id}") where attributes["url.path"] != nil
              - replace_pattern(attributes["url.path"], "/[0-9a-f]{8,}(/|$)", "/{id}$$1") where attributes["url.path"] != nil
              - replace_pattern(attributes["url.path"], "/[0-9]{4,}(/|$)", "/{id}$$1") where attributes["url.path"] != nil

      # Slice 20 (add-k3s-pod-log-shipping) rescope: the slice-18c
      # `filter/frontend_only` gate is replaced by a feedback-loop guard.
      # Today the only source dialing this collector's logs pipeline is
      # the FE SDK (via nginx /v1/) and the new node-local log-agent
      # DaemonSet (slice 20) — both legitimately carry non-frontend
      # records (backend pod stdout, log-agent self-logs). A frontend-
      # only gate would drop everything the agent ships.
      #
      # The new filter is defence-in-depth against a future slice
      # widening the log-agent's `include:` glob beyond `social_*/` to
      # cover the obs namespace's own pods on the same cluster. That
      # would produce: agent reads obs pod log -> gateway -> obs cluster
      # -> obs collector logs -> obs pod log file -> agent reads it
      # again -> ... a tight feedback loop. Today no obs namespace
      # exists on the app cluster, so this filter is a no-op in
      # practice; the OTTL line costs nanoseconds per record and keeps
      # the guard explicit in the config grep.
      filter/exclude_observability_self:
        logs:
          log_record:
            - 'resource.attributes["k8s.namespace.name"] == "observability"'

    extensions:
      # Bind explicitly to 0.0.0.0 — the contrib collector's
      # health_check extension defaults to `localhost:13133`,
      # which the kubelet probe cannot reach from outside the
      # pod's network namespace. Binding all interfaces is safe:
      # the port is not on the Service, so only the pod-local
      # kubelet probe ever reaches it.
      health_check:
        endpoint: 0.0.0.0:13133

    exporters:
      # Slice 18b cross-cluster traces path, slice 19 wraps it in mTLS.
      # `host.lima.internal:14317` is the local mirror of the
      # Hetzner reality (the obs box's tailscale / private-network
      # IP). Lima publishes the obs VM's :4317 as host :14317 (see
      # `infra/lima/obs.yaml` portForwards); klipper-lb inside the
      # obs VM terminates the LoadBalancer Service `collector` on
      # :4317 and routes to the obs cluster's collector pod. The
      # `+10000` offset on the obs host-side ports is symmetric with
      # the apiserver disambiguation (app `:16443`, obs `:16444`).
      #
      # Slice 19: the endpoint stays scheme-less — OTLP/gRPC clients
      # in the otelcol exporter pick the TLS transport based on the
      # `tls:` block, not the URL scheme (only OTLP/HTTP exporters
      # use http:// vs https://). The Lima portForward is L4 so the
      # TLS handshake bytes flow through transparently.
      otlp/obs-cluster:
        endpoint: host.lima.internal:14317
        tls:
          cert_file: /etc/otelcol-contrib/certs/client.crt
          key_file: /etc/otelcol-contrib/certs/client.key
          ca_file: /etc/otelcol-contrib/certs/ca.crt
          insecure: false

      # Slice 18c logs / metrics legs. OTLP/HTTP at `+10000` matches
      # the traces convention and the `infra/lima/obs.yaml` portForward.
      # Slice 19 wraps both OTLP/HTTP exporters in mTLS (https:// scheme
      # + same four `tls:` keys as the gRPC exporter).
      otlphttp/obs-cluster-logs:
        endpoint: https://host.lima.internal:14318
        tls:
          cert_file: /etc/otelcol-contrib/certs/client.crt
          key_file: /etc/otelcol-contrib/certs/client.key
          ca_file: /etc/otelcol-contrib/certs/ca.crt
          insecure: false
      otlphttp/obs-cluster-metrics:
        endpoint: https://host.lima.internal:14318
        tls:
          cert_file: /etc/otelcol-contrib/certs/client.crt
          key_file: /etc/otelcol-contrib/certs/client.key
          ca_file: /etc/otelcol-contrib/certs/ca.crt
          insecure: false

    service:
      extensions: [health_check]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch, transform/redact-path-ids]
          exporters: [otlp/obs-cluster]
        logs:
          receivers: [otlp]
          # `filter/exclude_observability_self` runs LAST so the
          # redaction pass observes records as the SDK / log-agent
          # emits them; the drop happens only after the auditable
          # redaction has run.
          processors: [batch, transform/redact-path-ids, filter/exclude_observability_self]
          exporters: [otlphttp/obs-cluster-logs]
        metrics:
          # Slice 22a (migrate-obs-content) added `prometheus/postgres-exporter`
          # alongside `otlp` here — same processors, same exporter.
          # The receiver list is alphabetised for stable diffs.
          receivers: [otlp, prometheus/postgres-exporter]
          # No path redaction on metrics: FE web-vitals attributes are
          # web-vitals shaped (`route`, `metric.name`), and the
          # source-side route-template labelling in
          # `frontend/src/observability/route-timing.tsx` already
          # collapses dynamic segments to placeholders.
          processors: [batch]
          exporters: [otlphttp/obs-cluster-metrics]
