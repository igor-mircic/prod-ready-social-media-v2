# In-cluster OpenTelemetry Collector pipeline (slice 18a / 18b / 18c / 19).
#
# Three pipelines, each DUAL-WRITING to compose AND obs destinations:
#   OTLP receiver (gRPC :4317, HTTP :4318, NO CORS — in-cluster only,
#                  the frontend pod's nginx reverse-proxies `/v1/*`
#                  to this receiver per slice 18c)
#     -> batch
#     -> traces:  transform/redact-path-ids
#                 -> otlp/compose-relay      (host.lima.internal:4317,  plaintext)
#                 -> otlp/obs-cluster        (host.lima.internal:14317, mTLS, slice 19)
#     -> logs:    transform/redact-path-ids, filter/frontend_only
#                 -> otlphttp/compose-relay-logs  (http://host.lima.internal:4318,   plaintext)
#                 -> otlphttp/obs-cluster-logs    (https://host.lima.internal:14318, mTLS, slice 19)
#     -> metrics: (batch only; FE web-vitals have no PII / no path data)
#                 -> otlphttp/compose-relay-metrics (http://host.lima.internal:4318,   plaintext)
#                 -> otlphttp/obs-cluster-metrics   (https://host.lima.internal:14318, mTLS, slice 19)
#
# Slice 19 (add-cross-cluster-mtls) wraps the three `*obs-cluster*`
# exporters in mTLS against a shared self-signed CA (cert material
# produced by `just obs-certs`; mounted at /etc/otelcol-contrib/certs/
# via a Kustomize secretGenerator-produced Secret). The compose-relay
# exporters STAY plaintext — that path is local-mirror-only and dies
# in slice 22 (`retire-compose-observability`); layering mTLS on it
# would be churn-for-zero-benefit. After slice 22 collapses dual-write
# to obs-only, every exporter remaining in this file is TLS-wrapped.
#
# Slice 18b added the second traces exporter (compose + obs). Slice 18c
# adds the logs and metrics pipelines symmetrically: every browser
# OTLP signal now arrives on this collector via the FE pod's nginx
# `/v1/` reverse-proxy and fans out to BOTH destinations. The compose
# receiver-side pipelines already accept all three signal types on the
# same `:4318` listener; the dual-write here keeps compose grafana and
# obs grafana side-by-side comparable until slice 22 retires the
# compose path.
#
# Exporters have independent retry / queue / failure state — a wedged
# obs collector does NOT block the compose path or vice-versa. This
# mirrors the slice-17 design's "build the new house before tearing
# down the old one" sequencing: compose grafana keeps showing exactly
# what it shows today, obs grafana grows the same view alongside it,
# and slice 22 (`retire-compose-observability`) drops every
# `*compose-relay*` exporter and collapses dual-write back to
# single-exporter (obs-only).
#
# Three collectors share the `transform/redact-path-ids` OTTL
# block byte-for-byte until slice 22:
#   - compose at `infra/observability/collector/collector-config.yaml`
#   - app cluster at this file
#   - obs cluster at `infra/k8s-obs/base/collector/configmap.yaml`
# If you edit one set of OTTL statements, you MUST edit the other
# two in the same commit, otherwise BE-in-k3s traffic gets
# asymmetric redaction across destinations. Slice 18c also updates
# every site to target `attributes["url.path"]` (the attribute the
# modern OTel Java agent actually emits) alongside the deprecated
# `http.url` / `http.target` / `url.full` keys.
#
# Dual-write is local-only — `infra/k8s/overlays/hetzner/kustomization.yaml`
# explicitly notes that Hetzner MUST NOT inherit dual-write
# (slice 22 collapses it before any prod cutover; doubling
# outbound trace volume from the app cluster in prod is a
# non-trivial bandwidth cost we don't want by accident).
apiVersion: v1
kind: ConfigMap
metadata:
  name: collector-config
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch: {}

      # Mirrors the compose collector's redact-path-ids block.
      # Patterns, in order:
      #   1. UUID v4 (lowercase hex with hyphens).
      #   2. opaque hex segments of length 8+, bounded by `/` or
      #      end-of-string. The trailing delimiter is captured
      #      (`$$1`) because Go's RE2 has no lookahead.
      #   3. numeric segments of length 4+, bounded as above.
      # UUID must come first so its hex form is not eaten by the
      # opaque-hex rule. Replacement is uniform (`{id}`).
      transform/redact-path-ids:
        trace_statements:
          - context: span
            statements:
              - replace_pattern(name, "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}", "{id}")
              - replace_pattern(name, "/[0-9a-f]{8,}(/|$)", "/{id}$$1")
              - replace_pattern(name, "/[0-9]{4,}(/|$)", "/{id}$$1")
              - replace_pattern(attributes["http.url"], "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}", "{id}") where attributes["http.url"] != nil
              - replace_pattern(attributes["http.url"], "/[0-9a-f]{8,}(/|$)", "/{id}$$1") where attributes["http.url"] != nil
              - replace_pattern(attributes["http.url"], "/[0-9]{4,}(/|$)", "/{id}$$1") where attributes["http.url"] != nil
              - replace_pattern(attributes["http.target"], "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}", "{id}") where attributes["http.target"] != nil
              - replace_pattern(attributes["http.target"], "/[0-9a-f]{8,}(/|$)", "/{id}$$1") where attributes["http.target"] != nil
              - replace_pattern(attributes["http.target"], "/[0-9]{4,}(/|$)", "/{id}$$1") where attributes["http.target"] != nil
              - replace_pattern(attributes["url.full"], "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}", "{id}") where attributes["url.full"] != nil
              - replace_pattern(attributes["url.full"], "/[0-9a-f]{8,}(/|$)", "/{id}$$1") where attributes["url.full"] != nil
              - replace_pattern(attributes["url.full"], "/[0-9]{4,}(/|$)", "/{id}$$1") where attributes["url.full"] != nil
              # Slice 18c: target the attribute the modern OTel Java
              # agent actually emits. `http.url`/`http.target`/`url.full`
              # are kept for defence-in-depth against older
              # instrumentation.
              - replace_pattern(attributes["url.path"], "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}", "{id}") where attributes["url.path"] != nil
              - replace_pattern(attributes["url.path"], "/[0-9a-f]{8,}(/|$)", "/{id}$$1") where attributes["url.path"] != nil
              - replace_pattern(attributes["url.path"], "/[0-9]{4,}(/|$)", "/{id}$$1") where attributes["url.path"] != nil

      # Slice 18c FE-only gate. The OTLP/HTTP receiver carries logs from
      # any source that POSTs to `/v1/logs`; today only the frontend SDK
      # does (via the FE pod's nginx `/v1/` proxy), but the explicit
      # drop here makes the boundary auditable and prevents accidental
      # cross-pollination if a future slice adds a BE-via-OTLP path.
      # Mirrors the compose collector's slice-7 filter exactly.
      filter/frontend_only:
        logs:
          log_record:
            - 'resource.attributes["service.name"] != "frontend"'

    extensions:
      # Bind explicitly to 0.0.0.0 — the contrib collector's
      # health_check extension defaults to `localhost:13133`,
      # which the kubelet probe cannot reach from outside the
      # pod's network namespace. Binding all interfaces is safe:
      # the port is not on the Service, so only the pod-local
      # kubelet probe ever reaches it.
      health_check:
        endpoint: 0.0.0.0:13133

    exporters:
      # Slice-15 host-alias bridge to the compose collector's
      # published OTLP/gRPC port. Slice 18b
      # (`bridge-collectors-to-obs-cluster`) keeps this exporter
      # in place during the transition window (alongside the new
      # `otlp/obs-cluster` exporter below) so the operator can
      # open compose grafana and obs grafana side-by-side and
      # confirm identical backend traces. Slice 22
      # (`retire-compose-observability`) drops this exporter and
      # the corresponding `otlp/compose-relay` entry from the
      # traces pipeline's `exporters:` list.
      otlp/compose-relay:
        endpoint: host.lima.internal:4317
        tls:
          insecure: true

      # Slice 18b cross-cluster path, slice 19 wraps it in mTLS.
      # `host.lima.internal:14317` is the local mirror of the
      # Hetzner reality (the obs box's tailscale / private-network
      # IP). Lima publishes the obs VM's :4317 as host :14317 (see
      # `infra/lima/obs.yaml` portForwards); klipper-lb inside the
      # obs VM terminates the LoadBalancer Service `collector` on
      # :4317 and routes to the obs cluster's collector pod. The
      # +10000 offset avoids collision with the compose collector's
      # already-published host :4317.
      #
      # Slice 19: the endpoint stays scheme-less — OTLP/gRPC clients
      # in the otelcol exporter pick the TLS transport based on the
      # `tls:` block, not the URL scheme (only OTLP/HTTP exporters
      # use http:// vs https://). The Lima portForward is L4 so the
      # TLS handshake bytes flow through transparently.
      otlp/obs-cluster:
        endpoint: host.lima.internal:14317
        tls:
          cert_file: /etc/otelcol-contrib/certs/client.crt
          key_file: /etc/otelcol-contrib/certs/client.key
          ca_file: /etc/otelcol-contrib/certs/ca.crt
          insecure: false

      # Slice 18c logs / metrics dual-write. OTLP/HTTP because the
      # compose collector's `:4318` listener already accepts all three
      # signal types from slices 5/6/7. The `+10000` offset on the obs
      # exporters matches the traces convention and the
      # `infra/lima/obs.yaml` portForward. Slice 19 wraps both obs-
      # cluster OTLP/HTTP exporters in mTLS (https:// scheme + same
      # four `tls:` keys as the gRPC exporter); the two compose-relay
      # OTLP/HTTP exporters stay plaintext.
      otlphttp/compose-relay-logs:
        endpoint: http://host.lima.internal:4318
        tls:
          insecure: true
      otlphttp/obs-cluster-logs:
        endpoint: https://host.lima.internal:14318
        tls:
          cert_file: /etc/otelcol-contrib/certs/client.crt
          key_file: /etc/otelcol-contrib/certs/client.key
          ca_file: /etc/otelcol-contrib/certs/ca.crt
          insecure: false
      otlphttp/compose-relay-metrics:
        endpoint: http://host.lima.internal:4318
        tls:
          insecure: true
      otlphttp/obs-cluster-metrics:
        endpoint: https://host.lima.internal:14318
        tls:
          cert_file: /etc/otelcol-contrib/certs/client.crt
          key_file: /etc/otelcol-contrib/certs/client.key
          ca_file: /etc/otelcol-contrib/certs/ca.crt
          insecure: false

    service:
      extensions: [health_check]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch, transform/redact-path-ids]
          # Dual-write: order is not significant for OTel
          # multi-exporter fan-out (each exporter has independent
          # retry/queue state), but the list is alphabetized for
          # stable diffs.
          exporters: [otlp/compose-relay, otlp/obs-cluster]
        logs:
          receivers: [otlp]
          # `filter/frontend_only` runs LAST so the redaction pass
          # observes records as the SDK emits them; the drop happens
          # only after the auditable redaction has run.
          processors: [batch, transform/redact-path-ids, filter/frontend_only]
          exporters: [otlphttp/compose-relay-logs, otlphttp/obs-cluster-logs]
        metrics:
          receivers: [otlp]
          # No path redaction on metrics: FE web-vitals attributes are
          # web-vitals shaped (`route`, `metric.name`), and the
          # source-side route-template labelling in
          # `frontend/src/observability/route-timing.tsx` already
          # collapses dynamic segments to placeholders.
          processors: [batch]
          exporters: [otlphttp/compose-relay-metrics, otlphttp/obs-cluster-metrics]
