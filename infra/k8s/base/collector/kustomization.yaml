# OpenTelemetry Collector workload — slice 18a
# (add-k3s-app-collector). This is the first of three sub-slices
# that move observability out of compose-on-host into the app /
# obs k3s clusters. This sub-slice does data-plane work only: the
# in-cluster collector stands up, the backend's OTLP target flips
# from `host.lima.internal:4318` to the in-cluster Service FQDN,
# and the collector relays traces back to the compose collector
# via `host.lima.internal:4317`. No data crosses the app-cluster /
# obs-cluster boundary yet (that is slice 18b
# `bridge-collectors-to-obs-cluster`). No browser change yet (that
# is slice 18c `route-browser-otlp-through-nginx`).
#
# Sibling config: `infra/observability/collector/collector-config.yaml`
# (the compose collector). The two collectors duplicate the
# `transform/redact-path-ids` OTTL block on purpose for the
# duration of the transition — if you edit one, edit the other.
# Slice 22 (`retire-compose-observability`) collapses the two
# into one.
#
# The image tag is pinned via the `images:` directive below so
# bumping it is a one-line edit. The Deployment references the
# image by name without an inline tag.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/name: collector
      app.kubernetes.io/part-of: social

resources:
  - ./configmap.yaml
  - ./deployment.yaml
  - ./service.yaml

# Slice 19 (add-cross-cluster-mtls). Pull the per-cluster client
# cert + key + CA cert from ./certs/ into a Kubernetes Secret. The
# Deployment mounts this Secret at /etc/otelcol-contrib/certs/; the
# three `otlp/obs-cluster*` exporters reference those paths in their
# tls: blocks. No `disableNameSuffixHash: true` — we WANT Kustomize
# to suffix the Secret name with a content hash so that re-running
# `just obs-certs` (which re-keys every leaf) produces a new Secret
# name and Kustomize-driven `kubectl apply` automatically rolls the
# collector pod. Cert rotation is therefore one command.
secretGenerator:
  - name: collector-certs
    files:
      - certs/client.crt
      - certs/client.key
      - certs/ca.crt

images:
  - name: otel/opentelemetry-collector-contrib
    newTag: 0.111.0
